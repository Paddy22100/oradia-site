<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin - ORADIA</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+SC:wght@400;500;600;700&family=Lora:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --dore: #d4af37;
            --night-blue: #051428;
            --deep-blue: #1a365d;
            --light-gold: #f4e4c1;
        }
        
        body {
            background: linear-gradient(135deg, var(--night-blue) 0%, var(--deep-blue) 100%);
            min-height: 100vh;
        }
        
        .cormorant {
            font-family: 'Cormorant SC', serif;
        }
        
        .cinzel {
            font-family: 'Cinzel', serif;
        }
        
        .lora {
            font-family: 'Lora', serif;
        }
        
        .gold-gradient {
            background: linear-gradient(135deg, var(--dore), var(--light-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .btn-gold {
            background: linear-gradient(135deg, var(--dore), var(--light-gold));
            color: var(--night-blue);
            font-weight: 600;
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.3);
        }
        
        .btn-gold:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .input-field {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: var(--light-gold);
            padding: 12px 16px;
            border-radius: 8px;
            width: 100%;
            transition: all 0.3s ease;
        }
        
        .input-field:focus {
            outline: none;
            border-color: var(--dore);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }
        
        .input-field::placeholder {
            color: rgba(244, 228, 193, 0.5);
        }
        
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: none;
        }
        
        .success-message {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: none;
        }
        
        .lock-icon {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .countdown {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 8px 12px;
            border-radius: 6px;
            text-align: center;
            font-size: 14px;
            margin-top: 12px;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md">
        <!-- Logo et titre -->
        <div class="text-center mb-8">
            <div class="mb-4">
                <i class="fas fa-lock lock-icon text-4xl gold-gradient"></i>
            </div>
            <h1 class="cinzel text-3xl font-bold gold-gradient mb-2">Connexion Admin</h1>
            <p class="lora text-light-gold/80">Accès réservé à l'administrateur</p>
        </div>
        
        <!-- Formulaire de connexion -->
        <div class="bg-[rgba(5,20,40,0.8)] backdrop-blur-md rounded-2xl p-8 border border-gold/30 shadow-2xl">
            <!-- Messages -->
            <div id="errorMessage" class="error-message">
                <i class="fas fa-exclamation-triangle mr-2"></i>
                <span id="errorText">Identifiants incorrects</span>
            </div>
            
            <div id="successMessage" class="success-message">
                <i class="fas fa-check-circle mr-2"></i>
                <span>Connexion réussie</span>
            </div>
            
            <form id="loginForm">
                <!-- Email -->
                <div class="mb-6">
                    <label for="email" class="block text-light-gold text-sm font-medium mb-2">
                        <i class="fas fa-envelope mr-2"></i>Email
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="input-field"
                        placeholder="admin@oradia.fr"
                        required
                    >
                </div>
                
                <!-- Mot de passe -->
                <div class="mb-6">
                    <label for="password" class="block text-light-gold text-sm font-medium mb-2">
                        <i class="fas fa-key mr-2"></i>Mot de passe
                    </label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="input-field"
                        placeholder="••••••••"
                        required
                    >
                </div>
                
                <!-- Bouton de connexion -->
                <button type="submit" id="loginBtn" class="btn-gold w-full justify-center">
                    <i class="fas fa-sign-in-alt"></i>
                    Se connecter
                </button>
            </form>
            
            <!-- Compte à rebours -->
            <div id="countdown" class="countdown" style="display: none;">
                <i class="fas fa-clock mr-2"></i>
                <span id="countdownText">Veuillez patienter...</span>
            </div>
        </div>
        
        <!-- Pied de page -->
        <div class="text-center mt-8">
            <p class="text-light-gold/60 text-sm">
                <i class="fas fa-shield-alt mr-2"></i>
                Connexion sécurisée · ORADIA
            </p>
        </div>
    </div>
    
    <script>
        // Identifiants admin (obfusqués en base64)
        // admin@oradia.fr : Oradia2026!
        const ADMIN_EMAIL = "YWRtaW5Ab3JhZGlhLmZy";
        const ADMIN_PASSWORD = "T3JhZGlhMjAyNiE=";
        const MAX_ATTEMPTS = 3;
        const LOCKOUT_DURATION = 60000; // 60 secondes
        
        let attempts = 0;
        let lockoutUntil = null;
        
        // Vérifier si l'utilisateur est déjà bloqué
        function checkLockout() {
            if (lockoutUntil && Date.now() < lockoutUntil) {
                const remaining = Math.ceil((lockoutUntil - Date.now()) / 1000);
                showCountdown(remaining);
                return true;
            } else {
                lockoutUntil = null;
                hideCountdown();
                return false;
            }
        }
        
        // Afficher le compte à rebours
        function showCountdown(seconds) {
            const countdown = document.getElementById('countdown');
            const countdownText = document.getElementById('countdownText');
            const loginBtn = document.getElementById('loginBtn');
            
            countdown.style.display = 'block';
            loginBtn.disabled = true;
            
            const interval = setInterval(() => {
                seconds--;
                if (seconds <= 0) {
                    clearInterval(interval);
                    hideCountdown();
                    loginBtn.disabled = false;
                    attempts = 0;
                } else {
                    countdownText.textContent = `Trop de tentatives. Réessayez dans ${seconds}s`;
                }
            }, 1000);
        }
        
        // Masquer le compte à rebours
        function hideCountdown() {
            document.getElementById('countdown').style.display = 'none';
            document.getElementById('loginBtn').disabled = false;
        }
        
        // Afficher un message d'erreur
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            
            errorText.textContent = message;
            errorDiv.style.display = 'block';
            
            // Masquer après 3 secondes
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }
        
        // Afficher un message de succès
        function showSuccess() {
            const successDiv = document.getElementById('successMessage');
            successDiv.style.display = 'block';
            
            // Masquer après 2 secondes et rediriger
            setTimeout(() => {
                sessionStorage.setItem('oradia_admin', 'true');
                window.location.href = 'dashboard.html';
            }, 2000);
        }
        
        // Décoder base64
        function decodeBase64(str) {
            try {
                return atob(str);
            } catch (e) {
                return '';
            }
        }
        
        // Gérer la soumission du formulaire
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Vérifier si l'utilisateur est bloqué
            if (checkLockout()) {
                return;
            }
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            
            // Désactiver le bouton pendant la vérification
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Vérification...';
            
            // Simuler une vérification asynchrone
            setTimeout(() => {
                const decodedEmail = decodeBase64(ADMIN_EMAIL);
                const decodedPassword = decodeBase64(ADMIN_PASSWORD);
                
                if (email === decodedEmail && password === decodedPassword) {
                    showSuccess();
                } else {
                    attempts++;
                    
                    if (attempts >= MAX_ATTEMPTS) {
                        lockoutUntil = Date.now() + LOCKOUT_DURATION;
                        showError(`Trop de tentatives incorrectes. Compte bloqué pour 60 secondes.`);
                        checkLockout();
                    } else {
                        const remaining = MAX_ATTEMPTS - attempts;
                        showError(`Identifiants incorrects. ${remaining} tentative(s) restante(s).`);
                    }
                    
                    // Réactiver le bouton
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>Se connecter';
                    
                    // Vider les champs
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }
            }, 1000);
        });
        
        // Vérifier au chargement de la page
        document.addEventListener('DOMContentLoaded', () => {
            checkLockout();
            
            // Focus sur le premier champ vide
            if (!document.getElementById('email').value) {
                document.getElementById('email').focus();
            } else if (!document.getElementById('password').value) {
                document.getElementById('password').focus();
            }
        });
        
        // Empêcher le retour en arrière après déconnexion
        window.addEventListener('pageshow', (event) => {
            if (event.persisted) {
                sessionStorage.removeItem('oradia_admin');
                window.location.reload();
            }
        });
    </script>
</body>
</html>
