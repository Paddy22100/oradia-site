<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin - ORADIA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../responsive.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'night-blue': '#0a192f',
                        'gold': '#d4af37',
                        'light-gold': '#f5e7a1',
                        'dark-blue': '#051428',
                        'celtic-blue': '#1a365d'
                    },
                    fontFamily: {
                        'cormorant': ['Cormorant Garamond', 'serif'],
                        'poppins': ['Poppins', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap');
        
        .gold-gradient {
            background: linear-gradient(135deg, #d4af37, #f4e4c1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .admin-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a192f, #051428);
        }

        .login-card {
            background: rgba(5, 20, 40, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .form-input {
            background: rgba(10, 25, 47, 0.7);
            border: 1px solid rgba(212, 175, 55, 0.35);
            transition: all 0.3s ease;
        }

        .form-input:focus {
            border-color: #d4af37;
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
            outline: none;
        }

        .btn-admin {
            background: linear-gradient(135deg, #d4af37, #f4e4c1);
            color: #051428;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-admin:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .success-message {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
        }
    </style>
</head>
<body class="admin-container">
    <!-- Header admin -->
    <header class="bg-[rgba(5,20,40,0.8)] backdrop-blur-md border-b border-gold/20">
        <div class="container mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <img src="../images/logo-hd-v2.jpeg" alt="ORADIA" class="w-10 h-10 rounded-full">
                    <div>
                        <h1 class="cormorant text-2xl font-bold gold-gradient">ORADIA</h1>
                        <p class="text-light-gold/70 text-sm">Espace d'administration</p>
                    </div>
                </div>
                <a href="../index.html" class="text-light-gold/70 hover:text-gold transition-colors">
                    <i class="fas fa-arrow-left mr-2"></i>Retour au site
                </a>
            </div>
        </div>
    </header>

    <!-- Contenu principal -->
    <main class="flex items-center justify-center min-h-screen py-12 px-6">
        <div class="max-w-md w-full">
            <!-- Carte de connexion -->
            <div class="login-card rounded-2xl p-8 shadow-2xl">
                <!-- Logo et titre -->
                <div class="text-center mb-8">
                    <div class="w-20 h-20 mx-auto mb-4 bg-gradient-to-br from-gold to-light-gold rounded-full flex items-center justify-center">
                        <i class="fas fa-shield-alt text-night-blue text-3xl"></i>
                    </div>
                    <h2 class="cormorant text-3xl font-bold gold-gradient mb-2">Connexion Admin</h2>
                    <p class="text-light-gold/70">Accédez à votre tableau de bord</p>
                </div>

                <!-- Messages d'erreur/succès -->
                <div id="messageContainer" class="mb-6 hidden">
                    <!-- Messages insérés par JavaScript -->
                </div>

                <!-- Formulaire de connexion -->
                <form id="loginForm" class="space-y-6">
                    <!-- Champ email -->
                    <div>
                        <label for="email" class="block text-light-gold mb-2 font-medium">
                            <i class="fas fa-envelope mr-2"></i>Email
                        </label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            class="form-input w-full px-4 py-3 rounded-lg text-light-gold placeholder-light-gold/50"
                            placeholder="admin@oradia.fr"
                            required
                            autocomplete="username"
                        >
                    </div>

                    <!-- Champ mot de passe -->
                    <div>
                        <label for="password" class="block text-light-gold mb-2 font-medium">
                            <i class="fas fa-lock mr-2"></i>Mot de passe
                        </label>
                        <div class="relative">
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                class="form-input w-full px-4 py-3 rounded-lg text-light-gold placeholder-light-gold/50 pr-12"
                                placeholder="••••••••"
                                required
                                autocomplete="current-password"
                            >
                            <button 
                                type="button" 
                                id="togglePassword"
                                class="absolute right-3 top-1/2 transform -translate-y-1/2 text-light-gold/50 hover:text-gold transition-colors"
                            >
                                <i class="fas fa-eye" id="eyeIcon"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Options de connexion -->
                    <div class="flex items-center justify-between">
                        <label class="flex items-center text-light-gold/70 text-sm">
                            <input type="checkbox" id="remember" class="mr-2 rounded border-gold/30 bg-night-blue">
                            <span>Se souvenir de moi</span>
                        </label>
                        <a href="#" class="text-gold hover:text-light-gold text-sm transition-colors">
                            Mot de passe oublié ?
                        </a>
                    </div>

                    <!-- Bouton de connexion -->
                    <button 
                        type="submit" 
                        id="loginBtn"
                        class="btn-admin w-full py-4 rounded-lg font-semibold flex items-center justify-center gap-3 disabled:opacity-50 disabled:cursor-not-allowed"
                    >
                        <i class="fas fa-sign-in-alt"></i>
                        <span id="loginBtnText">Se connecter</span>
                    </button>
                </form>

                <!-- Informations de sécurité -->
                <div class="mt-8 pt-6 border-t border-gold/20">
                    <div class="text-center text-light-gold/50 text-sm space-y-2">
                        <p><i class="fas fa-shield-alt mr-1"></i>Connexion sécurisée</p>
                        <p>3 tentatives maximum - Blocage temporaire</p>
                    </div>
                </div>
            </div>

            <!-- Retour -->
            <div class="text-center mt-8">
                <a href="../index.html" class="text-light-gold/70 hover:text-gold transition-colors inline-flex items-center gap-2">
                    <i class="fas fa-home"></i>
                    Retour à l'accueil
                </a>
            </div>
        </div>
    </main>

    <!-- Script de connexion -->
    <script>
// Éléments DOM
const loginForm = document.getElementById('loginForm');
const loginBtn = document.getElementById('loginBtn');
const loginBtnText = document.getElementById('loginBtnText');
const emailInput = document.getElementById('email');
const passwordInput = document.getElementById('password');
const togglePassword = document.getElementById('togglePassword');
const eyeIcon = document.getElementById('eyeIcon');
const messageContainer = document.getElementById('messageContainer');

// Afficher un message
function showMessage(message, type = 'error') {
    messageContainer.innerHTML = `
        <div class="${type}-message px-4 py-3 rounded-lg text-sm">
            <i class="fas fa-${type === 'error' ? 'exclamation-triangle' : 'check-circle'} mr-2"></i>
            ${message}
        </div>
    `;
    messageContainer.classList.remove('hidden');
    
    // Masquer après 5 secondes
    setTimeout(() => {
        messageContainer.classList.add('hidden');
    }, 5000);
}

// Vérifier si déjà connecté au chargement (une seule fois)
let sessionChecked = false;
async function checkExistingSession() {
    if (sessionChecked) return false;
    sessionChecked = true;
    
    try {
        const response = await fetch('/api/admin/me', {
            credentials: 'include'
        });
        
        if (response.ok) {
            // Session valide, rediriger vers dashboard
            window.location.href = 'dashboard-admin.html';
            return true;
        }
    } catch (error) {
        // Session invalide ou erreur, rester sur login
        console.log('Session non valide ou expirée');
    }
    return false;
}

// Gérer la connexion
async function handleLogin(e) {
    e.preventDefault();
    
    const email = emailInput.value.trim();
    const password = passwordInput.value;

    // Validation basique
    if (!email || !password) {
        showMessage('Veuillez remplir tous les champs.', 'error');
        return;
    }

    // Désactiver le bouton
    loginBtn.disabled = true;
    loginBtnText.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Connexion...';

    try {
        const response = await fetch('/api/admin/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            credentials: 'include',
            body: JSON.stringify({ email, password })
        });

        const result = await response.json();

        if (result.success) {
            showMessage('Connexion réussie! Redirection...', 'success');
            
            // Rediriger vers le dashboard
            setTimeout(() => {
                window.location.href = 'dashboard-admin.html';
            }, 1500);
        } else {
            showMessage(result.message || 'Identifiants incorrects', 'error');
        }
    } catch (error) {
        showMessage('Erreur de connexion. Réessayez plus tard.', 'error');
        console.error('Erreur login:', error);
    } finally {
        // Réactiver le bouton
        loginBtn.disabled = false;
        loginBtnText.textContent = 'Se connecter';
    }
}

// Toggle mot de passe
togglePassword.addEventListener('click', () => {
    const type = passwordInput.type === 'password' ? 'text' : 'password';
    passwordInput.type = type;
    eyeIcon.className = type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
});

// Gérer le "Se souvenir de moi"
document.getElementById('remember').addEventListener('change', (e) => {
    if (e.target.checked) {
        localStorage.setItem('rememberedEmail', emailInput.value);
    } else {
        localStorage.removeItem('rememberedEmail');
    }
});

// Initialisation
document.addEventListener('DOMContentLoaded', async () => {
    // Vérifier si déjà connecté
    const isLoggedIn = await checkExistingSession();
    if (isLoggedIn) {
        return; // Redirection déjà en cours
    }

    // Restaurer email remembered
    const rememberedEmail = localStorage.getItem('rememberedEmail');
    if (rememberedEmail) {
        emailInput.value = rememberedEmail;
        document.getElementById('remember').checked = true;
    }

    // Attacher les événements
    loginForm.addEventListener('submit', handleLogin);
});
    </script>
</body>
</html>
