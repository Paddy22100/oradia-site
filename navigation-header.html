<!-- Navigation Header Component -->
<header class="header-bg w-full py-3 px-4 md:py-4 md:px-8">
  <div class="flex items-center justify-between">
    <div class="flex items-center">
      <a href="index.html#accueil" class="flex items-center">
        <img src="images/logo-hd-v2.jpeg" alt="Oradia Logo"
         class="w-16 h-16 object-contain transform hover:scale-110 transition-transform duration-300" />
        <span class="cormorant text-3xl font-bold gold-gradient">ORADIA</span>
      </a>
    </div>
    
    <!-- Bouton burger (mobile) -->
    <button id="mobileMenuBtn" type="button" class="md:hidden inline-flex items-center justify-center w-10 h-10 rounded-lg border border-gold text-gold" aria-label="Ouvrir le menu">
      <i class="fas fa-bars text-lg"></i>
    </button>
    
    <!-- Navigation desktop -->
    <nav class="hidden md:flex space-x-6 text-lg">
      <a href="index.html#accueil" class="text-gold hover:text-light-gold transition font-medium"><i class="fas fa-home mr-2"></i>Accueil</a>
      <a href="pelerin.html" class="text-gold hover:text-light-gold transition font-medium"><i class="fas fa-dice mr-2"></i>Oracle</a>
      <a href="accompagnements.html" class="text-gold hover:text-light-gold transition font-medium"><i class="fas fa-tags mr-2"></i>Accompagnements</a>
      <a href="rendez-vous.html" class="text-gold hover:text-light-gold transition font-medium"><i class="fas fa-calendar-check mr-2"></i>Rendez-vous</a>
      <a href="a-propos.html" class="text-gold hover:text-light-gold transition font-medium"><i class="fas fa-info-circle mr-2"></i>À Propos</a>
      <a href="partenariats.html" class="text-gold hover:text-light-gold transition font-medium"><i class="fas fa-handshake mr-2"></i>Partenariats</a>
      <a href="contact.html" class="text-gold hover:text-light-gold transition font-medium"><i class="fas fa-envelope mr-2"></i>Contact</a>
    </nav>
    
    <!-- Espace membre (desktop) -->
    <div id="memberMenuWrapper" class="hidden md:block relative">
      <!-- Bouton Espace membre -->
      <button id="memberMenuBtn" class="flex items-center gap-2 text-gold font-medium hover:text-light-gold transition">
        <i class="fas fa-user-circle text-2xl"></i>
        <span>Espace membre</span>
        <i class="fas fa-chevron-down text-sm ml-1"></i>
      </button>

      <!-- Dropdown -->
      <div id="memberDropdown"
           class="hidden absolute right-0 mt-2 w-48 bg-[rgba(5,20,40,0.95)] border border-gold/30 rounded-lg shadow-lg z-50 backdrop-blur-md">
        <a href="member/profile.html" class="block px-4 py-2 text-gold hover:bg-gold/10">Profil</a>
        <button id="logoutBtn" class="w-full text-left px-4 py-2 text-gold hover:bg-gold/10">Déconnexion</button>
      </div>
    </div>
  </div>

  <!-- Menu mobile déroulant -->
  <nav id="mobileMenu" class="md:hidden hidden mt-3 space-y-2">
    <a href="index.html#accueil" class="block px-3 py-2 rounded-lg border border-gold/30 text-gold hover:bg-gold/10 transition-colors"><i class="fas fa-home mr-2"></i>Accueil</a>
    <a href="pelerin.html" class="block px-3 py-2 rounded-lg border border-gold/30 text-gold hover:bg-gold/10 transition-colors"><i class="fas fa-dice mr-2"></i>Oracle</a>
    <a href="accompagnements.html" class="block px-3 py-2 rounded-lg border border-gold/30 text-gold hover:bg-gold/10 transition-colors"><i class="fas fa-tags mr-2"></i>Accompagnements</a>
    <a href="rendez-vous.html" class="block px-3 py-2 rounded-lg border border-gold/30 text-gold hover:bg-gold/10 transition-colors"><i class="fas fa-calendar-check mr-2"></i>Rendez-vous</a>
    <a href="a-propos.html" class="block px-3 py-2 rounded-lg border border-gold/30 text-gold hover:bg-gold/10 transition-colors"><i class="fas fa-info-circle mr-2"></i>À Propos</a>
    <a href="partenariats.html" class="block px-3 py-2 rounded-lg border border-gold/30 text-gold hover:bg-gold/10 transition-colors"><i class="fas fa-handshake mr-2"></i>Partenariats</a>
    <a href="contact.html" class="block px-3 py-2 rounded-lg border border-gold/30 text-gold hover:bg-gold/10 transition-colors"><i class="fas fa-envelope mr-2"></i>Contact</a>
    <button id="loginBtnMobile" class="w-full btn-outline-gold" style="display: none;">Connexion</button>
  </nav>
</header>

<script>
// Menu mobile
const mobileMenuBtn = document.getElementById('mobileMenuBtn');
const mobileMenu = document.getElementById('mobileMenu');

if (mobileMenuBtn && mobileMenu) {
  mobileMenuBtn.addEventListener('click', () => {
    mobileMenu.classList.toggle('hidden');
  });
}

// Menu membre
const memberMenuBtn = document.getElementById('memberMenuBtn');
const memberDropdown = document.getElementById('memberDropdown');

if (memberMenuBtn && memberDropdown) {
  memberMenuBtn.addEventListener('click', () => {
    memberDropdown.classList.toggle('hidden');
  });
}

// Fermer les menus en cliquant ailleurs
document.addEventListener('click', (e) => {
  if (mobileMenuBtn && mobileMenu && !mobileMenuBtn.contains(e.target) && !mobileMenu.contains(e.target)) {
    mobileMenu.classList.add('hidden');
  }
  
  if (memberMenuBtn && memberDropdown && !memberMenuBtn.contains(e.target) && !memberDropdown.contains(e.target)) {
    memberDropdown.classList.add('hidden');
  }
});
</script>
