<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Scroll vers #offres</title>
    <style>
        html {
            scroll-behavior: smooth;
        }
        
        #offres {
            scroll-margin-top: 100px;
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #051428;
            color: #f4e4bc;
        }
        
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
        }
        
        .btn {
            background: #d4af37;
            color: #051428;
            padding: 16px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
        }
        
        .section {
            min-height: 100vh;
            padding: 100px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #offres {
            background: rgba(212, 175, 55, 0.1);
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Test de scroll vers #offres</h1>
        <a href="#offres" class="btn">Je précommande maintenant</a>
        <p>Cliquez sur le bouton ci-dessus</p>
    </div>
    
    <div class="section" style="background: rgba(26, 54, 93, 0.3);">
        <h2>Section intermédiaire 1</h2>
    </div>
    
    <div class="section" style="background: rgba(26, 54, 93, 0.4);">
        <h2>Section intermédiaire 2</h2>
    </div>
    
    <div id="offres" class="section">
        <h2>Section OFFRES (cible)</h2>
    </div>
    
    <div class="section" style="background: rgba(26, 54, 93, 0.5);">
        <h2>Section après offres</h2>
    </div>
    
    <script>
        // Log pour debug
        document.addEventListener('DOMContentLoaded', () => {
            console.log('Page chargée');
            console.log('Section #offres existe:', !!document.getElementById('offres'));
            console.log('scroll-behavior:', getComputedStyle(document.documentElement).scrollBehavior);
            
            // Test du lien
            const link = document.querySelector('a[href="#offres"]');
            if (link) {
                link.addEventListener('click', (e) => {
                    console.log('Clic sur le lien #offres');
                    console.log('Hash avant:', window.location.hash);
                    
                    // Laisser le comportement par défaut se produire
                    setTimeout(() => {
                        console.log('Hash après:', window.location.hash);
                        const target = document.getElementById('offres');
                        if (target) {
                            const rect = target.getBoundingClientRect();
                            console.log('Position de #offres:', {
                                top: rect.top,
                                bottom: rect.bottom,
                                visible: rect.top >= 0 && rect.bottom <= window.innerHeight
                            });
                        }
                    }, 100);
                });
            }
        });
    </script>
</body>
</html>
