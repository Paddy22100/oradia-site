name: Audit oradia.fr

on:
  # Automatique : tous les jours à 8h55 heure de Paris (UTC+2 en été)
  schedule:
    - cron: '55 6 * * *'   # Tous les jours 06:55 UTC = 08:55 Paris

  # Manuel : depuis l'onglet Actions sur GitHub
  workflow_dispatch:
    inputs:
      target_url:
        description: 'URL cible (laisser vide pour oradia.fr)'
        required: false
        default: 'https://oradia.fr'

jobs:
  audit:
    name: Audit complet oradia.fr
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ─── 1. Récupération du code ───────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── 2. Node.js ───────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: audit/package-lock.json

      # ─── 3. Dépendances ───────────────────────────────────
      - name: Install dependencies
        working-directory: ./audit
        run: npm ci

      # ─── 4. Playwright browsers ───────────────────────────
      - name: Install Playwright browsers
        working-directory: ./audit
        run: npx playwright install chromium --with-deps

      # ─── 5. Création du .env.audit depuis les secrets ─────
      - name: Create .env.audit from secrets
        working-directory: ./audit
        run: |
          cat > .env.audit << EOF
          AUDIT_TARGET_URL=${{ inputs.target_url || 'https://oradia.fr' }}
          AUDIT_EMAIL_TO=${{ secrets.AUDIT_EMAIL_TO }}
          AUDIT_SMTP_HOST=${{ secrets.AUDIT_SMTP_HOST }}
          AUDIT_SMTP_PORT=${{ secrets.AUDIT_SMTP_PORT }}
          AUDIT_SMTP_SECURE=${{ secrets.AUDIT_SMTP_SECURE }}
          AUDIT_SMTP_USER=${{ secrets.AUDIT_SMTP_USER }}
          AUDIT_SMTP_PASS=${{ secrets.AUDIT_SMTP_PASS }}
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          EOF

      # ─── 6. Lancement de l'audit ──────────────────────────
      - name: Run audit
        working-directory: ./audit
        run: node audit-oradia.js

      # ─── 6b. Vérification automatique des livraisons Mondial Relay ─
      - name: Check Mondial Relay deliveries
        if: always()
        run: |
          curl -s -o /dev/null -w "Statut: %{http_code}\n" -X POST \
            -H "Content-Type: application/json" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
            -d '{"action":"mr-check-deliveries"}' \
            "${{ inputs.target_url || 'https://oradia.fr' }}/api/admin/data"

      # ─── 6c. Export mensuel des tables (preorders/donors/tirages) ─
      # Envoyé par email le 1er de chaque mois uniquement
      - name: Monthly data export
        if: always()
        run: |
          if [ "$(date +%d)" = "01" ]; then
            curl -s -o /dev/null -w "Statut export mensuel: %{http_code}\n" -X POST \
              -H "Content-Type: application/json" \
              -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
              -d '{"action":"monthly-export-email"}' \
              "${{ inputs.target_url || 'https://oradia.fr' }}/api/admin/data"
          else
            echo "Pas le 1er du mois, export ignoré."
          fi

      # ─── 7. Upload du rapport comme artifact GitHub ────────
      - name: Upload audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-report-${{ github.run_number }}
          path: audit/audit-reports/
          retention-days: 90

      # ─── 8. Résumé dans le workflow GitHub ────────────────
      - name: Show summary
        if: always()
        working-directory: ./audit
        run: |
          echo "## Audit oradia.fr terminé" >> $GITHUB_STEP_SUMMARY
          echo "Rapport disponible dans les Artifacts de ce run." >> $GITHUB_STEP_SUMMARY
          ls -lh audit-reports/*.html 2>/dev/null || echo "Aucun rapport généré"
