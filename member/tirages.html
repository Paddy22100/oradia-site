<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historique des Tirages - ORADIA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../js/tirages-storage.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'night-blue': '#0a192f',
                        'gold': '#d4af37',
                        'light-gold': '#f5e7a1',
                        'dark-blue': '#051428',
                        'celtic-blue': '#1a365d'
                    },
                    fontFamily: {
                        'cormorant': ['Cormorant Garamond', 'serif'],
                        'poppins': ['Poppins', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap');
        
        .gold-gradient {
            background: linear-gradient(135deg, #d4af37, #f4e4c1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .tirage-card {
            background: linear-gradient(145deg, rgba(26,54,93,0.6), rgba(5,20,40,0.8));
            border: 1px solid rgba(212,175,55,0.3);
            transition: all 0.3s ease;
        }
        
        .tirage-card:hover {
            border-color: rgba(212,175,55,0.6);
            box-shadow: 0 4px 20px rgba(212,175,55,0.15);
            transform: translateY(-2px);
        }
        
        .sidebar-link {
            transition: all 0.3s ease;
        }
        
        .sidebar-link:hover {
            background: rgba(212,175,55,0.1);
            border-left: 3px solid #d4af37;
            padding-left: 20px;
        }
        
        .filter-btn {
            transition: all 0.2s ease;
        }
        
        .filter-btn:hover {
            background: rgba(212,175,55,0.2);
            border-color: #d4af37;
        }
        
        .filter-btn.active {
            background: rgba(212,175,55,0.3);
            border-color: #d4af37;
            color: #d4af37;
        }
        
        .detail-modal {
            backdrop-filter: blur(8px);
        }
        
        .passerelle-badge {
            background: linear-gradient(135deg, rgba(212,175,55,0.2), rgba(212,175,55,0.08));
            border: 1px solid rgba(212,175,55,0.4);
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 11px;
            color: #f5e7a1;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        @media print {
            body { background: white !important; color: #1a1a2e !important; }
            .no-print { display: none !important; }
            aside, header, .lg\:hidden { display: none !important; }
            main { padding: 0 !important; }
            .tirage-card {
                background: white !important;
                border: 1px solid #d4af37 !important;
                box-shadow: none !important;
                break-inside: avoid;
                page-break-inside: avoid;
                margin-bottom: 20px;
            }
            .tirage-card p, .tirage-card span { color: #1a1a2e !important; }
            .tirage-card .text-gold { color: #b8860b !important; }
            .tirage-card .text-light-gold { color: #2c2c2c !important; }
            .passerelle-badge { border: 1px solid #b8860b !important; color: #2c2c2c !important; background: #fff9e6 !important; }
            .print-header { display: block !important; }
        }
        .print-header { display: none; }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .slide-in {
            animation: slideIn 0.4s ease-out;
        }
    </style>
</head>
<body class="bg-night-blue text-light-gold">
    <!-- Header -->
    <header class="w-full py-4 px-4 lg:px-6 border-b border-gold/20 sticky top-0 z-50 bg-gradient-to-r from-[#051428] via-[#0a192f] to-[#051428] backdrop-blur-md">
        <div class="flex items-center justify-between max-w-7xl mx-auto">
            <!-- Logo -->
            <a href="../index.html" class="flex items-center gap-3 flex-shrink-0 group">
                <img src="../images/logo-hd-v2.jpeg" alt="ORADIA" class="w-11 h-11 rounded-full object-contain border-2 border-gold/30 group-hover:border-gold/50 transition-colors">
                <div>
                    <h1 class="font-cormorant text-2xl font-bold gold-gradient tracking-wide">ORADIA</h1>
                    <p class="text-gold/60 text-xs font-light tracking-wider">Historique des tirages</p>
                </div>
            </a>

            <!-- Droite : nom + déconnexion -->
            <div class="flex items-center gap-4">
                <div class="hidden lg:flex items-center gap-2 text-gold/80">
                    <i class="fas fa-user-circle text-gold/50"></i>
                    <span class="text-sm font-medium" id="memberName">Cher Membre</span>
                </div>
                <button id="logoutBtn" class="flex items-center gap-2 text-gold/70 hover:text-red-400 transition-all text-sm px-4 py-2 rounded-full border border-gold/20 hover:border-red-400/30 hover:bg-red-400/5">
                    <i class="fas fa-sign-out-alt"></i>
                    <span class="hidden sm:inline">Déconnexion</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-[rgba(5,20,40,0.6)] border-r border-gold/20 hidden lg:block">
            <nav class="p-6 space-y-2">
                <a href="dashboard.html" class="sidebar-link flex items-center gap-3 text-light-gold hover:text-gold p-3 rounded-lg">
                    <i class="fas fa-home w-5"></i>
                    <span>Tableau de bord</span>
                </a>
                <a href="tirages.html" class="sidebar-link flex items-center gap-3 text-gold p-3 rounded-lg bg-gold/10 border-l-3 border-gold">
                    <i class="fas fa-cards-blank w-5"></i>
                    <span>Historique des tirages</span>
                </a>
                <a href="profile.html" class="sidebar-link flex items-center gap-3 text-light-gold hover:text-gold p-3 rounded-lg">
                    <i class="fas fa-user-circle w-5"></i>
                    <span>Mon profil</span>
                </a>
                <a href="abonnements.html" class="sidebar-link flex items-center gap-3 text-light-gold hover:text-gold p-3 rounded-lg">
                    <i class="fas fa-crown w-5"></i>
                    <span>Abonnements</span>
                </a>
                <a href="parametres.html" class="sidebar-link flex items-center gap-3 text-light-gold hover:text-gold p-3 rounded-lg">
                    <i class="fas fa-cog w-5"></i>
                    <span>Paramètres</span>
                </a>
                <a href="support.html" class="sidebar-link flex items-center gap-3 text-light-gold hover:text-gold p-3 rounded-lg">
                    <i class="fas fa-heart w-5"></i>
                    <span>Votre avis & Contact</span>
                </a>
                <div class="border-t border-gold/10 my-2"></div>
                <a href="../index.html" class="sidebar-link flex items-center gap-3 text-light-gold hover:text-gold p-3 rounded-lg">
                    <i class="fas fa-arrow-left w-5"></i>
                    <span>Retour au site</span>
                </a>
                <a href="../tore.html" class="sidebar-link flex items-center gap-3 p-3 rounded-lg bg-gold/5 border border-gold/20 text-gold hover:bg-gold/15 transition-all">
                    <i class="fas fa-infinity w-5"></i>
                    <span class="font-semibold">Faire un tirage Tore</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-6 pb-24 lg:pb-6">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
                <div>
                    <h2 class="cormorant text-3xl text-gold mb-1">Historique des tirages</h2>
                    <p class="text-light-gold/60 text-sm" id="totalInfo">0 tirage enregistré</p>
                </div>
                <a href="../tore.html" class="bg-gold hover:bg-light-gold text-night-blue font-bold py-2 px-5 rounded-lg transition-colors">
                    <i class="fas fa-infinity mr-2"></i>Nouveau tirage
                </a>
            </div>

            <section id="tiragesList"></section>
        </main>
    </div>

    <!-- Mobile Menu -->
    <div class="lg:hidden fixed bottom-0 left-0 right-0 bg-[rgba(5,20,40,0.9)] border-t border-gold/20 z-40">
        <div class="flex justify-around py-2">
            <a href="dashboard.html" class="flex flex-col items-center p-2 text-light-gold">
                <i class="fas fa-home text-xl"></i>
                <span class="text-xs">Accueil</span>
            </a>
            <a href="tirages.html" class="flex flex-col items-center p-2 text-gold">
                <i class="fas fa-infinity text-xl"></i>
                <span class="text-xs">Tirages</span>
            </a>
            <a href="profile.html" class="flex flex-col items-center p-2 text-light-gold">
                <i class="fas fa-user text-xl"></i>
                <span class="text-xs">Profil</span>
            </a>
        </div>
    </div>

    <script>
        // Vérification session
        const SESSION_KEY = 'oradia_member_session';
        (function() {
            let sess = sessionStorage.getItem(SESSION_KEY);
            if (!sess && !(localStorage.getItem('userEmail') && localStorage.getItem('isLoggedIn') === 'true')) {
                window.location.href = 'login.html';
            }
        })();

        // Afficher le nom
        (function() {
            try {
                const sess = JSON.parse(sessionStorage.getItem(SESSION_KEY) || '{}');
                const name = sess.name || localStorage.getItem('userName') || sess.email?.split('@')[0] || 'Membre';
                const el = document.getElementById('memberName');
                if(el) el.textContent = name;
            } catch(e) {}
        })();

        // Afficher les tirages — Supabase (RLS par user_id) si connecté, sinon historique local "invité"
        let _tiragesCache = [];
        (async function() {
            const tirages = window.OradiaTirageStorage
                ? await window.OradiaTirageStorage.loadTirages()
                : JSON.parse(localStorage.getItem('oradia_tirages_invite') || '[]');
            _tiragesCache = tirages;
            const container = document.getElementById('tiragesList');
            const info = document.getElementById('totalInfo');

            const n = tirages.length;
            if(info) info.textContent = n === 0 ? 'Aucun tirage enregistré' : `${n} tirage${n > 1 ? 's' : ''} enregistré${n > 1 ? 's' : ''}`;

            if (n === 0) {
                container.innerHTML = `
                    <div class="bg-[rgba(26,54,93,0.4)] rounded-xl p-10 border border-gold/20 text-center">
                        <i class="fas fa-infinity text-4xl text-gold/30 mb-4 block"></i>
                        <p class="text-light-gold/60 mb-6">Aucun tirage enregistré pour l'instant.</p>
                        <a href="../tore.html" class="inline-block bg-gold text-night-blue font-bold px-8 py-3 rounded-lg hover:bg-light-gold transition-colors">
                            Commencer mon premier tirage
                        </a>
                    </div>`;
                return;
            }

            // Afficher du plus récent au plus ancien
            container.innerHTML = tirages.slice().reverse().map((t, idx) => {
                const date = t.date ? new Date(t.date).toLocaleDateString('fr-FR', { weekday:'long', day: 'numeric', month: 'long', year: 'numeric' }) : '—';

                const cartesBadges = t.cartes ? t.cartes.map(c =>
                    `<span style="display:inline-block;background:rgba(212,175,55,0.12);border:1px solid rgba(212,175,55,0.35);color:#d4af37;border-radius:6px;padding:4px 10px;font-size:12px;font-family:'Cormorant Garamond',serif;">${c}</span>`
                ).join('') : '';

                let interpretationsHtml = '';
                if (t.interpretations && t.interpretations.length > 0) {
                    interpretationsHtml = `<div style="margin-top:16px;border-top:1px solid rgba(212,175,55,0.15);padding-top:16px;">`;
                    interpretationsHtml += t.interpretations.map(interp => `
                        <div style="margin-bottom:14px;padding-left:12px;border-left:2px solid rgba(212,175,55,0.4);">
                            <p style="color:#d4af37;font-size:13px;font-weight:600;margin-bottom:3px;">${interp.position || ''} — ${interp.carte || ''}</p>
                            <p style="color:rgba(245,231,161,0.8);font-size:13px;line-height:1.6;">${interp.texte || ''}</p>
                        </div>`).join('');
                    interpretationsHtml += `</div>`;
                }

                let passerellesHtml = '';
                if (t.passerelles && t.passerelles.length > 0) {
                    const items = t.passerelles.map(p =>
                        `<div style="display:inline-flex;align-items:center;gap:6px;background:rgba(212,175,55,0.08);border:1px solid rgba(212,175,55,0.25);border-radius:6px;padding:4px 10px;font-size:12px;">
                            <span style="color:rgba(245,231,161,0.6);">${p.carte}</span>
                            <span style="color:rgba(212,175,55,0.5);">→</span>
                            <span style="color:#d4af37;font-weight:600;">${p.passerelle}</span>
                        </div>`
                    ).join('');
                    passerellesHtml = `
                        <div style="margin-top:14px;">
                            <p style="color:rgba(212,175,55,0.55);font-size:11px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;">Cartes passerelles</p>
                            <div style="display:flex;flex-wrap:wrap;gap:8px;">${items}</div>
                        </div>`;
                }

                const tirageId = 'tirage-' + idx;
                return `
                    <div class="tirage-card" id="${tirageId}" style="
                        background:linear-gradient(145deg,rgba(26,54,93,0.65),rgba(5,20,40,0.85));
                        border:1px solid rgba(212,175,55,0.28);
                        border-radius:16px;
                        overflow:hidden;
                        margin-bottom:20px;
                    ">
                        <div style="background:rgba(5,20,40,0.6);padding:18px 24px;border-bottom:1px solid rgba(212,175,55,0.2);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">
                            <div>
                                <p style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;background:linear-gradient(135deg,#d4af37,#f4e4c1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:0 0 2px;">${t.type || 'Tirage Tore'}</p>
                                <p style="color:rgba(245,231,161,0.45);font-size:12px;margin:0;text-transform:capitalize;">${date}</p>
                            </div>
                            <button onclick="downloadPDF(${idx})" title="Télécharger ce tirage en PDF"
                                style="background:rgba(212,175,55,0.1);border:1px solid rgba(212,175,55,0.4);color:#d4af37;border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;"
                                onmouseover="this.style.background='rgba(212,175,55,0.22)'" onmouseout="this.style.background='rgba(212,175,55,0.1)'">
                                <i class="fas fa-file-pdf"></i> Télécharger PDF
                            </button>
                        </div>
                        <div style="padding:20px 24px;">
                            ${t.intention ? `
                            <div style="margin-bottom:16px;padding:12px 16px;background:rgba(212,175,55,0.06);border-radius:0 8px 8px 0;border-left:3px solid rgba(212,175,55,0.5);">
                                <p style="color:rgba(212,175,55,0.6);font-size:10px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;">Intention</p>
                                <p style="color:rgba(245,231,161,0.9);font-size:14px;font-style:italic;">${t.intention}</p>
                            </div>` : ''}
                            ${cartesBadges ? `
                            <div style="margin-bottom:14px;">
                                <p style="color:rgba(212,175,55,0.55);font-size:10px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;">Cartes tirées</p>
                                <div style="display:flex;flex-wrap:wrap;gap:8px;">${cartesBadges}</div>
                            </div>` : ''}
                            ${interpretationsHtml}
                            ${passerellesHtml}
                            ${t.synthese ? `
                            <div style="margin-top:18px;padding:14px 18px;background:rgba(212,175,55,0.05);border-radius:10px;border:1px solid rgba(212,175,55,0.2);">
                                <p style="color:rgba(212,175,55,0.6);font-size:10px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;">Synthèse</p>
                                <p style="color:rgba(245,231,161,0.85);font-size:14px;line-height:1.8;font-style:italic;">${t.synthese}</p>
                            </div>` : ''}
                        </div>
                    </div>`;
            }).join('');
        })();

        // Téléchargement PDF élégant — Palier 3 #22 : design aligné sur le mail d'analyse,
        // ajout de la fenêtre d'observation et amélioration visuelle globale.
        function downloadPDF(tirageIdx) {
            // Réutilise les données déjà chargées (et sécurisées via RLS) au rendu de la liste —
            // évite un aller-retour réseau et reste cohérent avec ce qui est affiché à l'écran.
            const all = _tiragesCache.slice().reverse();
            const t = all[tirageIdx];
            if (!t) return;

            const sess = JSON.parse(sessionStorage.getItem('oradia_member_session') || '{}');
            const name = sess.name || localStorage.getItem('userName') || 'Membre';
            const date = t.date ? new Date(t.date).toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' }) : '—';

            const cartesBadgesHtml = t.cartes ? t.cartes.map(c =>
                `<span style="display:inline-block;background:rgba(212,175,55,0.12);border:1px solid rgba(212,175,55,0.45);color:#8b6914;border-radius:6px;padding:5px 13px;font-size:13px;font-family:'Cormorant Garamond',serif;margin:3px;">${c}</span>`
            ).join('') : '';

            const interpretationsSection = t.interpretations && t.interpretations.length ? `
                <div style="margin-top:24px;">
                    <p class="sl">Interprétations des cartes</p>
                    ${t.interpretations.map(i => `
                        <div style="margin-bottom:16px;padding:14px 16px 12px;border-left:3px solid #d4af37;background:#fffbf0;border-radius:0 8px 8px 0;">
                            <p style="color:#8b6914;font-size:11px;font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em;">${i.position || ''} — ${i.carte || ''}</p>
                            <p style="color:#2d2a1e;font-size:13.5px;line-height:1.75;">${i.texte || ''}</p>
                        </div>`).join('')}
                </div>` : '';

            const passerellesSection = t.passerelles && t.passerelles.length ? `
                <div style="margin-top:20px;">
                    <p class="sl">Cartes passerelles</p>
                    <div style="display:flex;flex-wrap:wrap;gap:6px;">
                        ${t.passerelles.map(p =>
                            `<span style="background:#fffbef;border:1px solid #d4af37;border-radius:6px;padding:5px 12px;font-size:13px;color:#5a4010;">${p.carte} → <strong style="color:#8b6914;">${p.passerelle}</strong></span>`
                        ).join('')}
                    </div>
                </div>` : '';

            const syntheseSection = t.synthese ? `
                <div class="hr"></div>
                <div style="padding:18px 20px;background:linear-gradient(135deg,rgba(212,175,55,0.07),rgba(212,175,55,0.02));border:1px solid rgba(212,175,55,0.28);border-radius:12px;">
                    <p class="sl">Synthèse de l'Oracle</p>
                    <p style="color:#2d2a1e;font-size:14.5px;line-height:1.9;font-style:italic;">${t.synthese}</p>
                </div>` : '';

            // Fenêtre d'observation — nouvelle section (Palier 3 #22)
            const obsWin = t.observation_window || t.observationWindow || null;
            const observationSection = obsWin ? `
                <div class="hr"></div>
                <div style="padding:18px 20px;background:#f0f8ff;border:1px solid #b0c4de;border-radius:12px;">
                    <p class="sl" style="color:#1e3a5f;">🌍 Fenêtre d'observation — ${obsWin.durationDays || '?'} jour${(obsWin.durationDays || 1) > 1 ? 's' : ''}</p>
                    ${obsWin.closesAt ? `<p style="color:#4a6a8a;font-size:12px;margin-bottom:10px;">Clôture le ${new Date(obsWin.closesAt).toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' })}</p>` : ''}
                    ${obsWin.observationText ? `<p style="color:#2d4a6a;font-size:13.5px;line-height:1.8;margin-bottom:12px;">${obsWin.observationText}</p>` : ''}
                    ${obsWin.attentionPoints && obsWin.attentionPoints.length ? `
                    <div style="background:#e8f0f8;border-radius:8px;padding:12px 14px;margin-top:6px;">
                        <p style="color:#1e3a5f;font-size:11px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;">Points d'attention</p>
                        ${obsWin.attentionPoints.map(pt => `<p style="color:#2d4a6a;font-size:13px;line-height:1.65;margin-bottom:6px;">› ${pt}</p>`).join('')}
                    </div>` : ''}
                </div>` : '';

            const html = `<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8">
<title>Oracle Oradia — ${t.type || 'Tirage'}</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Lora',Georgia,serif;background:#f4f0e8;color:#2d2a1e;padding:28px 16px;}
  .page{max-width:640px;margin:0 auto;}
  .card{background:#fff;border-radius:0;overflow:hidden;box-shadow:0 6px 40px rgba(150,110,20,0.14);border:1px solid rgba(212,175,55,0.3);}

  /* En-tête sombre — calqué sur le mail d'analyse */
  .card-header{background:linear-gradient(150deg,#07142a 0%,#0a192f 60%,#112240 100%);padding:32px 36px 24px;text-align:center;}
  .logo-row{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:18px;}
  .logo-row img{width:50px;height:50px;border-radius:50%;border:1.5px solid rgba(212,175,55,0.5);}
  .brand{font-size:28px;font-weight:700;letter-spacing:.32em;color:#f0c75e;font-family:'Cormorant Garamond',Georgia,serif;}
  .oracle-label{font-size:9.5px;color:rgba(212,175,55,0.45);letter-spacing:.45em;text-transform:uppercase;margin-top:3px;}
  .header-divider{width:56px;height:1px;background:linear-gradient(90deg,transparent,#d4af37,transparent);margin:14px auto 16px;}
  .header-tagline{font-size:12px;color:rgba(212,175,55,0.5);font-style:italic;letter-spacing:.04em;}

  /* Bandeau méta — date, type, membre */
  .tirage-meta{background:#02061a;padding:14px 36px;display:flex;justify-content:space-between;align-items:center;}
