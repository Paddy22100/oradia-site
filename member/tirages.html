<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historique des Tirages - ORADIA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'night-blue': '#0a192f',
                        'gold': '#d4af37',
                        'light-gold': '#f5e7a1',
                        'dark-blue': '#051428',
                        'celtic-blue': '#1a365d'
                    },
                    fontFamily: {
                        'cormorant': ['Cormorant Garamond', 'serif'],
                        'poppins': ['Poppins', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap');
        
        .gold-gradient {
            background: linear-gradient(135deg, #d4af37, #f4e4c1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .tirage-card {
            background: linear-gradient(145deg, rgba(26,54,93,0.6), rgba(5,20,40,0.8));
            border: 1px solid rgba(212,175,55,0.3);
            transition: all 0.3s ease;
        }
        
        .tirage-card:hover {
            border-color: rgba(212,175,55,0.6);
            box-shadow: 0 4px 20px rgba(212,175,55,0.15);
            transform: translateY(-2px);
        }
        
        .sidebar-link {
            transition: all 0.3s ease;
        }
        
        .sidebar-link:hover {
            background: rgba(212,175,55,0.1);
            border-left: 3px solid #d4af37;
            padding-left: 20px;
        }
        
        .filter-btn {
            transition: all 0.2s ease;
        }
        
        .filter-btn:hover {
            background: rgba(212,175,55,0.2);
            border-color: #d4af37;
        }
        
        .filter-btn.active {
            background: rgba(212,175,55,0.3);
            border-color: #d4af37;
            color: #d4af37;
        }
        
        .detail-modal {
            backdrop-filter: blur(8px);
        }
        
        .passerelle-badge {
            background: linear-gradient(135deg, rgba(212,175,55,0.2), rgba(212,175,55,0.08));
            border: 1px solid rgba(212,175,55,0.4);
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 11px;
            color: #f5e7a1;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        @media print {
            body { background: white !important; color: #1a1a2e !important; }
            .no-print { display: none !important; }
            aside, header, .lg\:hidden { display: none !important; }
            main { padding: 0 !important; }
            .tirage-card {
                background: white !important;
                border: 1px solid #d4af37 !important;
                box-shadow: none !important;
                break-inside: avoid;
                page-break-inside: avoid;
                margin-bottom: 20px;
            }
            .tirage-card p, .tirage-card span { color: #1a1a2e !important; }
            .tirage-card .text-gold { color: #b8860b !important; }
            .tirage-card .text-light-gold { color: #2c2c2c !important; }
            .passerelle-badge { border: 1px solid #b8860b !important; color: #2c2c2c !important; background: #fff9e6 !important; }
            .print-header { display: block !important; }
        }
        .print-header { display: none; }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .slide-in {
            animation: slideIn 0.4s ease-out;
        }
    </style>
</head>
<body class="bg-night-blue text-light-gold">
    <!-- Header -->
    <header class="bg-[rgba(5,20,40,0.8)] backdrop-blur-md border-b border-gold/20 sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <a href="../index.html" class="flex items-center gap-3">
                        <img src="../images/logo-hd-v2.jpeg" alt="ORADIA" class="w-10 h-10 rounded-full">
                        <div>
                            <h1 class="cormorant text-2xl font-bold gold-gradient">ORADIA</h1>
                            <p class="text-gold/70 text-sm">Historique des tirages</p>
                        </div>
                    </a>
                </div>
                
                <div class="flex items-center gap-4">
                    <div class="text-right">
                        <p class="text-gold font-medium" id="memberName">Cher Membre</p>
                        <p class="text-gold/60 text-sm">12 tirages au total</p>
                    </div>
                    <button id="logoutBtn" class="text-gold/70 hover:text-gold transition-colors">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-[rgba(5,20,40,0.6)] border-r border-gold/20 hidden lg:block">
            <nav class="p-6 space-y-2">
                <a href="dashboard.html" class="sidebar-link flex items-center gap-3 text-light-gold hover:text-gold p-3 rounded-lg">
                    <i class="fas fa-home w-5"></i>
                    <span>Tableau de bord</span>
                </a>
                <a href="tirages.html" class="sidebar-link flex items-center gap-3 text-gold p-3 rounded-lg bg-gold/10 border-l-3 border-gold">
                    <i class="fas fa-cards-blank w-5"></i>
                    <span>Historique des tirages</span>
                </a>
                <a href="profile.html" class="sidebar-link flex items-center gap-3 text-light-gold hover:text-gold p-3 rounded-lg">
                    <i class="fas fa-user-circle w-5"></i>
                    <span>Mon profil</span>
                </a>
                <a href="abonnements.html" class="sidebar-link flex items-center gap-3 text-light-gold hover:text-gold p-3 rounded-lg">
                    <i class="fas fa-crown w-5"></i>
                    <span>Abonnements</span>
                </a>
                <a href="parametres.html" class="sidebar-link flex items-center gap-3 text-light-gold hover:text-gold p-3 rounded-lg">
                    <i class="fas fa-cog w-5"></i>
                    <span>Paramètres</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-6 pb-24 lg:pb-6">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
                <div>
                    <h2 class="cormorant text-3xl text-gold mb-1">Historique des tirages</h2>
                    <p class="text-light-gold/60 text-sm" id="totalInfo">0 tirage enregistré</p>
                </div>
                <a href="../tore.html" class="bg-gold hover:bg-light-gold text-night-blue font-bold py-2 px-5 rounded-lg transition-colors">
                    <i class="fas fa-infinity mr-2"></i>Nouveau tirage
                </a>
            </div>

            <section id="tiragesList"></section>
        </main>
    </div>

    <!-- Mobile Menu -->
    <div class="lg:hidden fixed bottom-0 left-0 right-0 bg-[rgba(5,20,40,0.9)] border-t border-gold/20 z-40">
        <div class="flex justify-around py-2">
            <a href="dashboard.html" class="flex flex-col items-center p-2 text-light-gold">
                <i class="fas fa-home text-xl"></i>
                <span class="text-xs">Accueil</span>
            </a>
            <a href="tirages.html" class="flex flex-col items-center p-2 text-gold">
                <i class="fas fa-infinity text-xl"></i>
                <span class="text-xs">Tirages</span>
            </a>
            <a href="profile.html" class="flex flex-col items-center p-2 text-light-gold">
                <i class="fas fa-user text-xl"></i>
                <span class="text-xs">Profil</span>
            </a>
        </div>
    </div>

    <script>
        // Vérification session
        const SESSION_KEY = 'oradia_member_session';
        (function() {
            let sess = sessionStorage.getItem(SESSION_KEY);
            if (!sess && !(localStorage.getItem('userEmail') && localStorage.getItem('isLoggedIn') === 'true')) {
                window.location.href = 'login.html';
            }
        })();

        // Afficher le nom
        (function() {
            try {
                const sess = JSON.parse(sessionStorage.getItem(SESSION_KEY) || '{}');
                const name = sess.name || localStorage.getItem('userName') || sess.email?.split('@')[0] || 'Membre';
                const el = document.getElementById('memberName');
                if(el) el.textContent = name;
            } catch(e) {}
        })();

        // Afficher les tirages depuis localStorage
        (function() {
            const tirages = JSON.parse(localStorage.getItem('oradia_tirages') || '[]');
            const container = document.getElementById('tiragesList');
            const info = document.getElementById('totalInfo');

            const n = tirages.length;
            if(info) info.textContent = n === 0 ? 'Aucun tirage enregistré' : `${n} tirage${n > 1 ? 's' : ''} enregistré${n > 1 ? 's' : ''}`;

            if (n === 0) {
                container.innerHTML = `
                    <div class="bg-[rgba(26,54,93,0.4)] rounded-xl p-10 border border-gold/20 text-center">
                        <i class="fas fa-infinity text-4xl text-gold/30 mb-4 block"></i>
                        <p class="text-light-gold/60 mb-6">Aucun tirage enregistré pour l'instant.</p>
                        <a href="../tore.html" class="inline-block bg-gold text-night-blue font-bold px-8 py-3 rounded-lg hover:bg-light-gold transition-colors">
                            Commencer mon premier tirage
                        </a>
                    </div>`;
                return;
            }

            // Afficher du plus récent au plus ancien
            container.innerHTML = tirages.slice().reverse().map((t, idx) => {
                const date = t.date ? new Date(t.date).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' }) : '—';
                const cartes = t.cartes ? t.cartes.map(c => `<span class="text-xs bg-[rgba(212,175,55,0.15)] text-gold px-2 py-1 rounded">${c}</span>`).join('') : '';
                
                // Cartes passerelles
                let passerellesHtml = '';
                if (t.passerelles && t.passerelles.length > 0) {
                    const items = t.passerelles.map(p =>
                        `<span class="passerelle-badge"><i class="fas fa-link" style="font-size:9px;color:#d4af37;"></i>${p.carte} → <span style="color:#d4af37;font-weight:600;">${p.passerelle}</span></span>`
                    ).join('');
                    passerellesHtml = `
                        <div class="mt-3">
                            <p class="text-gold/60 text-xs uppercase tracking-wider mb-1"><i class="fas fa-link mr-1"></i>Cartes passerelles</p>
                            <div class="flex flex-wrap gap-2">${items}</div>
                        </div>`;
                }

                const tirageId = 'tirage-' + idx;
                return `
                    <div class="tirage-card rounded-xl p-6 mb-4" id="${tirageId}">
                        <div class="print-header" style="margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #d4af37;">
                            <strong style="font-size:16px;">Oracle Oradia — Historique des tirages</strong>
                        </div>
                        <div class="flex justify-between items-start mb-2">
                            <p class="text-gold font-semibold">${t.type || 'Tirage Tore'}</p>
                            <div class="flex items-center gap-3">
                                <span class="text-light-gold/50 text-xs">${date}</span>
                                <button onclick="downloadPDF('${tirageId}')" class="no-print" title="Télécharger en PDF"
                                    style="background:rgba(212,175,55,0.12);border:1px solid rgba(212,175,55,0.4);color:#d4af37;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;transition:all .2s;"
                                    onmouseover="this.style.background='rgba(212,175,55,0.25)'" onmouseout="this.style.background='rgba(212,175,55,0.12)'">
                                    <i class="fas fa-file-pdf mr-1"></i>PDF
                                </button>
                            </div>
                        </div>
                        ${t.intention ? `<p class="text-light-gold/70 text-sm mb-3"><span class="text-gold/60">Intention :</span> ${t.intention}</p>` : ''}
                        ${cartes ? `<div class="flex flex-wrap gap-2">${cartes}</div>` : ''}
                        ${passerellesHtml}
                        ${t.synthese ? `<p class="text-light-gold/80 text-sm mt-3 italic border-l-2 border-gold/30 pl-3">${t.synthese}</p>` : ''}
                    </div>`;
            }).join('');
        })();

        // Téléchargement PDF d'un tirage
        function downloadPDF(cardId) {
            const el = document.getElementById(cardId);
            if (!el) return;
            // Masquer tous les autres tirages temporairement
            const all = document.querySelectorAll('.tirage-card');
            all.forEach(c => { if (c.id !== cardId) c.style.display = 'none'; });
            document.querySelector('aside')?.style.setProperty('display','none');
            document.querySelector('header')?.style.setProperty('display','none');
            document.querySelector('.lg\\:hidden')?.style.setProperty('display','none');
            const pageTitle = document.title;
            const sess = JSON.parse(sessionStorage.getItem('oradia_member_session') || '{}');
            const name = sess.name || localStorage.getItem('userName') || 'Membre';
            document.title = 'Oradia - Analyse tirage - ' + name;
            window.print();
            document.title = pageTitle;
            all.forEach(c => { c.style.display = ''; });
            document.querySelector('aside')?.style.removeProperty('display');
            document.querySelector('header')?.style.removeProperty('display');
            document.querySelector('.lg\\:hidden')?.style.removeProperty('display');
        }

        // Déconnexion
        const logoutBtn = document.getElementById('logoutBtn');
        if(logoutBtn) logoutBtn.addEventListener('click', () => {
            sessionStorage.clear();
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('userEmail');
            localStorage.removeItem('userName');
            localStorage.removeItem('rememberMe');
            window.location.href = '../index.html';
        });
    </script>
</body>
</html>
