<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - ORADIA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../responsive.css">
    <script src="../security.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'night-blue': '#0a192f',
                        'gold': '#d4af37',
                        'light-gold': '#f5e7a1',
                        'dark-blue': '#051428',
                        'celtic-blue': '#1a365d'
                    },
                    fontFamily: {
                        'cormorant': ['Cormorant Garamond', 'serif'],
                        'poppins': ['Poppins', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap');
        
        .gold-gradient {
            background: linear-gradient(135deg, #d4af37, #f4e4c1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .register-container {
            background: linear-gradient(145deg, rgba(26,54,93,0.8), rgba(5,20,40,0.9));
            border: 1px solid rgba(212,175,55,0.3);
            box-shadow: 0 8px 30px rgba(212,175,55,0.15);
        }
        
        .input-field {
            background: rgba(5,20,40,0.8);
            border: 1px solid rgba(212,175,55,0.3);
            transition: all 0.3s ease;
        }
        
        .input-field:focus {
            border-color: #d4af37;
            box-shadow: 0 0 20px rgba(212,175,55,0.3);
        }
        
        .floating-orb {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212,175,55,0.3), transparent);
            filter: blur(20px);
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-in {
            animation: fadeIn 0.8s ease-out;
        }
        
        .social-login-btn {
            transition: all 0.3s ease;
            border: 1px solid rgba(212,175,55,0.3);
        }
        
        .social-login-btn:hover {
            border-color: #d4af37;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(212,175,55,0.2);
        }
        
        .step-indicator {
            transition: all 0.3s ease;
        }
        
        .step-indicator.active {
            background: #d4af37;
            color: #0a192f;
        }
        
        .step-indicator.completed {
            background: rgba(212,175,55,0.3);
            color: #d4af37;
        }
    </style>
</head>
<body class="bg-night-blue text-light-gold min-h-screen flex items-center justify-center relative overflow-hidden">
    <!-- Background Effects -->
    <div class="floating-orb w-64 h-64 top-10 left-10 opacity-30"></div>
    <div class="floating-orb w-48 h-48 bottom-20 right-20 opacity-25" style="animation-delay: 2s;"></div>
    <div class="floating-orb w-32 h-32 top-1/2 left-1/3 opacity-20" style="animation-delay: 4s;"></div>

    <!-- Register Container -->
    <div class="register-container rounded-3xl p-6 md:p-12 max-w-2xl w-full mx-4 relative z-10 fade-in">
        <!-- Logo and Title -->
        <div class="text-center mb-8">
            <div class="flex justify-center mb-6">
                <img src="../images/logo-hd-v2.jpeg" alt="ORADIA" class="w-20 h-20 rounded-full border-2 border-gold/50">
            </div>
            <h1 class="cormorant text-3xl md:text-4xl font-bold gold-gradient mb-2">Rejoindre ORADIA</h1>
            <p class="text-light-gold/80">Commencez votre voyage spirituel aujourd'hui</p>
        </div>

        <!-- Progress Steps -->
        <div class="flex justify-center mb-8">
            <div class="flex items-center space-x-4">
                <div class="step-indicator active w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold">1</div>
                <div class="w-12 h-0.5 bg-gold/30"></div>
                <div class="step-indicator w-8 h-8 rounded-full bg-[rgba(5,20,40,0.8)] border border-gold/30 flex items-center justify-center text-sm font-bold text-gold/50">2</div>
                <div class="w-12 h-0.5 bg-gold/30"></div>
                <div class="step-indicator w-8 h-8 rounded-full bg-[rgba(5,20,40,0.8)] border border-gold/30 flex items-center justify-center text-sm font-bold text-gold/50">3</div>
            </div>
        </div>

        <!-- Register Form -->
        <form id="registerForm" class="space-y-6">
            <!-- Step 1: Basic Information -->
            <div id="step1" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="firstName" class="block text-light-gold/80 text-sm mb-2">Prénom</label>
                        <div class="relative">
                            <i class="fas fa-user absolute left-3 top-1/2 transform -translate-y-1/2 text-gold/50"></i>
                            <input 
                                type="text" 
                                id="firstName" 
                                name="firstName" 
                                required
                                placeholder="Jean"
                                class="input-field w-full pl-10 pr-4 py-3 rounded-lg text-light-gold placeholder-gold/50 focus:outline-none"
                            >
                        </div>
                    </div>
                    
                    <div>
                        <label for="lastName" class="block text-light-gold/80 text-sm mb-2">Nom</label>
                        <div class="relative">
                            <i class="fas fa-user absolute left-3 top-1/2 transform -translate-y-1/2 text-gold/50"></i>
                            <input 
                                type="text" 
                                id="lastName" 
                                name="lastName" 
                                required
                                placeholder="Dupont"
                                class="input-field w-full pl-10 pr-4 py-3 rounded-lg text-light-gold placeholder-gold/50 focus:outline-none"
                            >
                        </div>
                    </div>
                </div>

                <div>
                    <label for="email" class="block text-light-gold/80 text-sm mb-2">Email</label>
                    <div class="relative">
                        <i class="fas fa-envelope absolute left-3 top-1/2 transform -translate-y-1/2 text-gold/50"></i>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            required
                            placeholder="votre@email.com"
                            class="input-field w-full pl-10 pr-4 py-3 rounded-lg text-light-gold placeholder-gold/50 focus:outline-none"
                        >
                    </div>
                </div>

                <div>
                    <label for="phone" class="block text-light-gold/80 text-sm mb-2">Téléphone (optionnel)</label>
                    <div class="relative">
                        <i class="fas fa-phone absolute left-3 top-1/2 transform -translate-y-1/2 text-gold/50"></i>
                        <input 
                            type="tel" 
                            id="phone" 
                            name="phone" 
                            placeholder="06 12 34 56 78"
                            class="input-field w-full pl-10 pr-4 py-3 rounded-lg text-light-gold placeholder-gold/50 focus:outline-none"
                        >
                    </div>
                </div>

                <div>
                    <label for="birthdate" class="block text-light-gold/80 text-sm mb-2">Date de naissance</label>
                    <div class="relative">
                        <i class="fas fa-calendar absolute left-3 top-1/2 transform -translate-y-1/2 text-gold/50"></i>
                        <input 
                            type="date" 
                            id="birthdate" 
                            name="birthdate" 
                            required
                            class="input-field w-full pl-10 pr-4 py-3 rounded-lg text-light-gold focus:outline-none"
                        >
                    </div>
                </div>
            </div>

            <!-- Step 2: Password -->
            <div id="step2" class="hidden space-y-4">
                <div>
                    <label for="password" class="block text-light-gold/80 text-sm mb-2">Mot de passe</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-3 top-1/2 transform -translate-y-1/2 text-gold/50"></i>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            required
                            placeholder="••••••••"
                            class="input-field w-full pl-10 pr-12 py-3 rounded-lg text-light-gold placeholder-gold/50 focus:outline-none"
                        >
                        <button 
                            type="button" 
                            id="togglePassword"
                            class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gold/50 hover:text-gold transition-colors"
                        >
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="mt-2">
                        <div class="text-xs text-light-gold/60">
                            <div class="flex items-center gap-2 mb-1">
                                <i class="fas fa-check text-gold/50" id="lengthCheck"></i>
                                <span>8 caractères minimum</span>
                            </div>
                            <div class="flex items-center gap-2 mb-1">
                                <i class="fas fa-check text-gold/50" id="upperCheck"></i>
                                <span>1 majuscule</span>
                            </div>
                            <div class="flex items-center gap-2 mb-1">
                                <i class="fas fa-check text-gold/50" id="numberCheck"></i>
                                <span>1 chiffre</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div>
                    <label for="confirmPassword" class="block text-light-gold/80 text-sm mb-2">Confirmer le mot de passe</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-3 top-1/2 transform -translate-y-1/2 text-gold/50"></i>
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            name="confirmPassword" 
                            required
                            placeholder="••••••••"
                            class="input-field w-full pl-10 pr-4 py-3 rounded-lg text-light-gold placeholder-gold/50 focus:outline-none"
                        >
                    </div>
                    <div class="mt-2">
                        <div class="text-xs text-light-gold/60">
                            <div class="flex items-center gap-2">
                                <i class="fas fa-check text-gold/50" id="matchCheck"></i>
                                <span>Les mots de passe correspondent</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Step 3: Preferences -->
            <div id="step3" class="hidden space-y-4">
                <div class="space-y-3">
                    <label class="flex items-center">
                        <input type="checkbox" name="newsletter" class="mr-3 rounded">
                        <span class="text-light-gold/80">Recevoir la newsletter ORADIA</span>
                    </label>
                    
                    <label class="flex items-start">
                        <input type="checkbox" name="terms" required class="mr-3 mt-1 rounded">
                        <span class="text-light-gold/80">
                            J'accepte les <a href="../cgu.html" target="_blank" class="text-gold hover:text-light-gold">Conditions Générales d'Utilisation</a>, 
                            les <a href="../cgv.html" target="_blank" class="text-gold hover:text-light-gold">Conditions Générales de Vente</a> 
                            et la <a href="../politique-confidentialite.html" target="_blank" class="text-gold hover:text-light-gold">politique de confidentialité</a> *
                        </span>
                    </label>
                    
                    <label class="flex items-center">
                        <input type="checkbox" name="marketing" class="mr-3 rounded">
                        <span class="text-light-gold/80">J'accepte de recevoir des offres personnalisées</span>
                    </label>
                </div>

                <div class="bg-gold/10 rounded-lg p-4 border border-gold/30">
                    <h4 class="text-gold font-semibold mb-2">Pourquoi rejoindre ORADIA ?</h4>
                    <textarea 
                        name="reason" 
                        rows="3" 
                        placeholder="Partagez vos attentes (optionnel)..."
                        class="w-full bg-[rgba(5,20,40,0.8)] border border-gold/20 rounded-lg p-3 text-light-gold placeholder-gold/50 focus:outline-none focus:border-gold resize-none"
                    ></textarea>
                </div>
            </div>

            <!-- Navigation Buttons -->
            <div class="flex justify-between items-center pt-6">
                <button 
                    type="button" 
                    id="prevBtn" 
                    class="hidden border border-gold text-gold hover:bg-gold hover:text-night-blue font-bold py-2 px-6 rounded-lg transition-colors"
                >
                    <i class="fas fa-arrow-left mr-2"></i>
                    Précédent
                </button>
                
                <div class="flex gap-3">
                    <button 
                        type="button" 
                        id="nextBtn" 
                        class="bg-gold hover:bg-light-gold text-night-blue font-bold py-2 px-6 rounded-lg transition-colors"
                    >
                        Suivant
                        <i class="fas fa-arrow-right ml-2"></i>
                    </button>
                    
                    <button 
                        type="submit" 
                        id="submitBtn" 
                        class="hidden bg-gradient-to-r from-gold to-light-gold hover:from-light-gold hover:to-gold text-night-blue font-bold py-2 px-6 rounded-lg transition-all transform hover:scale-105 shadow-lg"
                    >
                        <i class="fas fa-user-plus mr-2"></i>
                        Créer mon compte
                    </button>
                </div>
            </div>
        </form>

        <!-- Divider -->
        <div class="relative my-8">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-gold/30"></div>
            </div>
            <div class="relative flex justify-center text-sm">
                <span class="px-4 bg-night-blue text-light-gold/70">Ou s'inscrire avec</span>
            </div>
        </div>

        <!-- Social Register -->
        <div class="space-y-3">
            <button class="social-login-btn w-full bg-[rgba(5,20,40,0.8)] py-3 rounded-lg flex items-center justify-center gap-3 hover:bg-[rgba(5,20,40,0.9)] transition-all">
                <i class="fab fa-google text-red-400"></i>
                <span class="text-light-gold">Google</span>
            </button>
            
            <button class="social-login-btn w-full bg-[rgba(5,20,40,0.8)] py-3 rounded-lg flex items-center justify-center gap-3 hover:bg-[rgba(5,20,40,0.9)] transition-all">
                <i class="fab fa-facebook text-blue-400"></i>
                <span class="text-light-gold">Facebook</span>
            </button>
        </div>

        <!-- Login Link -->
        <div class="text-center mt-8 pt-6 border-t border-gold/20">
            <p class="text-light-gold/70 text-sm">
                Déjà un compte ? 
                <a href="login.html" class="text-gold hover:text-light-gold font-medium transition-colors">
                    Se connecter
                </a>
            </p>
        </div>

        <!-- Back to Site -->
        <div class="text-center mt-6">
            <a href="../index.html" class="text-light-gold/60 hover:text-light-gold text-sm transition-colors">
                <i class="fas fa-arrow-left mr-2"></i>
                Retour au site
            </a>
        </div>
    </div>

    <!-- Success Message -->
    <div id="successMessage" class="hidden fixed top-4 right-4 bg-green-600 text-white px-6 py-3 rounded-lg shadow-lg z-50">
        <i class="fas fa-check-circle mr-2"></i>
        Compte créé avec succès !
    </div>

    <!-- Error Message -->
    <div id="errorMessage" class="hidden fixed top-4 right-4 bg-red-600 text-white px-6 py-3 rounded-lg shadow-lg z-50">
        <i class="fas fa-exclamation-circle mr-2"></i>
        <span id="errorText">Erreur lors de l'inscription</span>
    </div>

    <script>
        let currentStep = 1;
        const totalSteps = 3;

        // Password validation
        function validatePassword(password) {
            const lengthCheck = password.length >= 8;
            const upperCheck = /[A-Z]/.test(password);
            const numberCheck = /[0-9]/.test(password);
            
            document.getElementById('lengthCheck').className = lengthCheck ? 'fas fa-check text-gold' : 'fas fa-check text-gold/50';
            document.getElementById('upperCheck').className = upperCheck ? 'fas fa-check text-gold' : 'fas fa-check text-gold/50';
            document.getElementById('numberCheck').className = numberCheck ? 'fas fa-check text-gold' : 'fas fa-check text-gold/50';
            
            return lengthCheck && upperCheck && numberCheck;
        }

        // Password match validation
        function validatePasswordMatch() {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const matchCheck = password === confirmPassword && password.length > 0;
            
            document.getElementById('matchCheck').className = matchCheck ? 'fas fa-check text-gold' : 'fas fa-check text-gold/50';
            
            return matchCheck;
        }

        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });

        // Password input validation
        document.getElementById('password').addEventListener('input', function() {
            validatePassword(this.value);
            validatePasswordMatch();
        });

        document.getElementById('confirmPassword').addEventListener('input', validatePasswordMatch);

        // Step navigation
        function showStep(step) {
            // Hide all steps
            for (let i = 1; i <= totalSteps; i++) {
                document.getElementById(`step${i}`).classList.add('hidden');
            }
            
            // Show current step
            document.getElementById(`step${step}`).classList.remove('hidden');
            
            // Update step indicators
            const indicators = document.querySelectorAll('.step-indicator');
            indicators.forEach((indicator, index) => {
                if (index + 1 < step) {
                    indicator.className = 'step-indicator completed w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold';
                    indicator.innerHTML = '<i class="fas fa-check text-xs"></i>';
                } else if (index + 1 === step) {
                    indicator.className = 'step-indicator active w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold';
                    indicator.textContent = step;
                } else {
                    indicator.className = 'step-indicator w-8 h-8 rounded-full bg-[rgba(5,20,40,0.8)] border border-gold/30 flex items-center justify-center text-sm font-bold text-gold/50';
                    indicator.textContent = index + 1;
                }
            });
            
            // Update buttons
            document.getElementById('prevBtn').classList.toggle('hidden', step === 1);
            document.getElementById('nextBtn').classList.toggle('hidden', step === totalSteps);
            document.getElementById('submitBtn').classList.toggle('hidden', step !== totalSteps);
        }

        // Next button
        document.getElementById('nextBtn').addEventListener('click', function() {
            if (currentStep === 1) {
                // Validate step 1
                const firstName = document.getElementById('firstName').value;
                const lastName = document.getElementById('lastName').value;
                const email = document.getElementById('email').value;
                const birthdate = document.getElementById('birthdate').value;
                
                if (!firstName || !lastName || !email || !birthdate) {
                    showError('Veuillez remplir tous les champs obligatoires');
                    return;
                }
            } else if (currentStep === 2) {
                // Validate step 2
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                
                if (!validatePassword(password)) {
                    showError('Le mot de passe ne respecte pas les critères de sécurité');
                    return;
                }
                
                if (!validatePasswordMatch()) {
                    showError('Les mots de passe ne correspondent pas');
                    return;
                }
            }
            
            currentStep++;
            showStep(currentStep);
        });

        // Previous button
        document.getElementById('prevBtn').addEventListener('click', function() {
            currentStep--;
            showStep(currentStep);
        });

        // Form submission
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Validate final step
            const terms = document.querySelector('input[name="terms"]').checked;
            if (!terms) {
                showError('Vous devez accepter les conditions d\'utilisation');
                return;
            }
            
            // Show success message
            const successMsg = document.getElementById('successMessage');
            successMsg.classList.remove('hidden');
            
            // Store user info (for demo)
            const formData = new FormData(this);
            const userData = {};
            for (let [key, value] of formData.entries()) {
                userData[key] = value;
            }
            
            localStorage.setItem('isNewUser', 'true');
            localStorage.setItem('userEmail', userData.email);
            localStorage.setItem('userName', `${userData.firstName} ${userData.lastName}`);
            
            // Redirect to dashboard after 2 seconds
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 2000);
        });

        // Social register handlers
        document.querySelectorAll('.social-login-btn').forEach(button => {
            button.addEventListener('click', function() {
                const provider = this.textContent.trim();
                alert(`Inscription avec ${provider} bientôt disponible!`);
            });
        });

        // Helper functions
        function showError(message) {
            const errorMsg = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorMsg.classList.remove('hidden');
            
            setTimeout(() => {
                errorMsg.classList.add('hidden');
            }, 3000);
        }

        // Initialize
        showStep(1);

        // Add floating animation to orbs
        document.querySelectorAll('.floating-orb').forEach((orb, index) => {
            orb.style.animationDelay = `${index * 2}s`;
        });
    </script>
</body>
</html>
