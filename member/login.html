<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — ORADIA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Lora:wght@400;500&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Lora', Georgia, serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        .bg-scene { position: fixed; inset: 0; background: url('../images/oradia-hero-4k.png') center/cover no-repeat; z-index: 0; }
        .bg-overlay { position: fixed; inset: 0; background: linear-gradient(140deg,rgba(4,10,28,0.78) 0%,rgba(8,18,42,0.72) 100%); backdrop-filter: blur(2px); z-index: 1; }

        /* Wrapper centré */
        .wrapper {
            position: relative; z-index: 2;
            width: min(420px, 90vw);
            background: linear-gradient(155deg, rgba(12,24,58,0.82) 0%, rgba(6,14,36,0.88) 100%);
            border: 1px solid rgba(212,175,55,0.35);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 32px 100px rgba(0,0,0,0.55), 0 0 80px rgba(212,175,55,0.12), inset 0 0 60px rgba(212,175,55,0.03);
            animation: fadeUp .5s cubic-bezier(.22,.68,0,1.2) both;
            backdrop-filter: blur(10px);
        }
        @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }

        /* Ligne verticale supprimée - layout unique */

        .col { padding: 48px 40px; display: flex; flex-direction: column; justify-content: center; }

        /* Branding */
        .brand { display: flex; align-items: center; gap: 14px; margin-bottom: 8px; }
        .brand img { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; border: 1.5px solid rgba(212,175,55,0.45); box-shadow: 0 0 22px rgba(212,175,55,0.2); }
        .brand-name { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 26px; font-weight: 700; letter-spacing: 0.28em; text-transform: uppercase; background: linear-gradient(135deg,#f0c75e,#d4af37); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .col-title { font-family: 'Cormorant Garamond', Georgia, serif; font-size: clamp(22px,2.5vw,30px); font-weight: 700; color: #f5e4a0; line-height: 1.2; margin-bottom: 4px; }
        .col-sub { font-size: 13px; color: rgba(220,210,175,0.62); letter-spacing: 0.04em; margin-bottom: 28px; }
        .divider-line { width: 40px; height: 1px; background: linear-gradient(90deg,transparent,rgba(212,175,55,0.55),transparent); margin-bottom: 28px; }

        /* Champs */
        .fg { margin-bottom: 16px; }
        .fl { display: block; font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; color: rgba(212,175,55,0.85); margin-bottom: 7px; font-weight: 500; }
        .fw { position: relative; }
        .fi { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: rgba(212,175,55,0.52); font-size: 13px; pointer-events: none; }
        .fi-input {
            width: 100%; background: rgba(255,255,255,0.07); border: 1px solid rgba(212,175,55,0.32); border-radius: 11px;
            padding: 13px 14px 13px 40px; color: #f0ece0; font-family: 'Lora',serif; font-size: 14px; outline: none;
            transition: border-color .2s, background .2s, box-shadow .2s;
        }
        .fi-input:focus { border-color: rgba(212,175,55,0.80); background: rgba(255,255,255,0.11); box-shadow: 0 0 0 3px rgba(212,175,55,0.10); }
        .fi-input::placeholder { color: rgba(212,175,55,0.33); }

        /* Œil */
        .eye { position: absolute; right: 13px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: rgba(212,175,55,0.35); font-size: 13px; transition: color .2s; padding: 2px; }
        .eye:hover { color: rgba(212,175,55,0.80); }

        /* Ligne remember / forgot */
        .row-opt { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
        .remember { display: flex; align-items: center; gap: 8px; font-size: 12px; color: rgba(220,210,175,0.65); cursor: pointer; }
        .remember input { accent-color: #d4af37; width: 14px; height: 14px; }
        .forgot { font-size: 12px; color: rgba(212,175,55,0.68); text-decoration: none; transition: color .2s; }
        .forgot:hover { color: #f0c75e; }

        /* Bouton principal */
        .btn-main { width: 100%; background: linear-gradient(135deg,rgba(212,175,55,0.20),rgba(212,175,55,0.09)); border: 1.5px solid rgba(212,175,55,0.80); color: #f0c75e; border-radius: 50px; padding: 15px; cursor: pointer; font-family: 'Cormorant Garamond',serif; font-size: 17px; font-weight: 700; letter-spacing: 0.20em; text-transform: uppercase; box-shadow: 0 0 30px rgba(212,175,55,0.10); transition: all .2s; }
        .btn-main:hover { background: linear-gradient(135deg,rgba(212,175,55,0.32),rgba(212,175,55,0.16)); box-shadow: 0 0 42px rgba(212,175,55,0.22); }

        /* Message erreur inline */
        .login-err { font-size: 12px; color: rgba(231,76,60,0.90); min-height: 16px; margin-top: 10px; text-align: center; }

        /* Lien mot de passe oublié */
        .forgot-link { background: none; border: none; cursor: pointer; font-size: 12px; color: rgba(212,175,55,0.68); font-family: 'Lora',serif; padding: 0; transition: color .2s; text-decoration: none; }
        .forgot-link:hover { color: #f0c75e; }

        /* Colonne droite — Créer un compte */
        .right-col { text-align: center; }
        .right-title { font-family: 'Cormorant Garamond',serif; font-size: 26px; font-weight: 700; color: #f5e4a0; margin-bottom: 8px; }
        .right-sub { font-size: 13px; color: rgba(215,205,170,0.60); line-height: 1.65; max-width: 240px; margin: 0 auto 28px; }
        .right-ornament-icon { font-size: 32px; color: rgba(212,175,55,0.55); margin-bottom: 22px; }

        /* Points décoratifs */
        .perks { list-style: none; text-align: left; margin-bottom: 32px; display: inline-block; }
        .perks li { display: flex; align-items: center; gap: 10px; font-size: 13px; color: rgba(230,220,185,0.78); margin-bottom: 11px; }
        .perks li i { color: rgba(212,175,55,0.72); font-size: 11px; width: 14px; }

        /* Bouton secondaire */
        .btn-register { display: inline-block; background: none; border: 1.5px solid rgba(212,175,55,0.55); color: rgba(212,175,55,0.88); border-radius: 50px; padding: 14px 40px; text-decoration: none; font-family: 'Cormorant Garamond',serif; font-size: 16px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; transition: all .2s; }
        .btn-register:hover { border-color: rgba(212,175,55,0.90); color: #f0c75e; box-shadow: 0 0 32px rgba(212,175,55,0.15); }

        /* Modal mot de passe oublié */
        .modal-overlay { position: fixed; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center; padding: 20px; background: rgba(2,5,18,0.72); backdrop-filter: blur(4px); animation: fadeUp .25s ease both; }
        .modal-box { background: linear-gradient(155deg,rgba(12,24,58,0.96) 0%,rgba(6,14,36,0.98) 100%); border: 1px solid rgba(212,175,55,0.35); border-radius: 22px; padding: 40px 36px; max-width: 420px; width: 100%; text-align: center; box-shadow: 0 24px 80px rgba(0,0,0,0.6); }
        .modal-title { font-family: 'Cormorant Garamond',serif; font-size: 22px; font-weight: 700; color: #f5e4a0; margin-bottom: 6px; }
        .modal-sub { font-size: 13px; color: rgba(215,205,170,0.58); margin-bottom: 24px; line-height: 1.6; }
        .modal-err { font-size: 12px; min-height: 16px; margin-top: 10px; text-align: center; }
        .modal-err.error { color: rgba(231,76,60,0.90); }
        .modal-err.success { color: rgba(80,200,120,0.90); }
        .modal-close { background: none; border: none; cursor: pointer; font-size: 11px; color: rgba(212,175,55,0.35); font-family: 'Lora',serif; margin-top: 14px; letter-spacing: 0.06em; transition: color .2s; }
        .modal-close:hover { color: rgba(212,175,55,0.65); }

        .back-home { display: block; text-align: center; margin-top: 20px; font-size: 11px; color: rgba(212,175,55,0.32); text-decoration: none; letter-spacing: 0.06em; transition: color .2s; }
        .back-home:hover { color: rgba(212,175,55,0.60); }

        /* Flash */
        .flash { position: fixed; top: 18px; right: 18px; z-index: 99; padding: 13px 20px; border-radius: 12px; font-size: 13px; font-family: 'Lora',serif; box-shadow: 0 8px 28px rgba(0,0,0,0.5); animation: fadeUp .3s ease both; }
        .flash.error { background: rgba(170,35,35,0.92); color: #fff; border: 1px solid rgba(255,100,100,0.3); }
        .flash.success { background: rgba(25,120,65,0.92); color: #fff; border: 1px solid rgba(80,200,120,0.3); }

        /* Responsive */
        @media (max-width: 660px) {
            body { overflow-y: auto; align-items: flex-start; padding: 20px 0; }
            .wrapper { max-height: none; border-radius: 20px; width: 94vw; }
            .col { padding: 36px 24px; }
        }
    </style>
</head>
<body>
    <div class="bg-scene"></div>
    <div class="bg-overlay"></div>

    <div class="wrapper">

        <!-- ══ COLONNE GAUCHE : Connexion ══ -->
        <div class="col">
            <div class="brand">
                <img src="../images/logo-hd-v2.jpeg" alt="ORADIA">
                <span class="brand-name">ORADIA</span>
            </div>
            <h1 class="col-title">Connexion</h1>
            <p class="col-sub">Retrouvez votre espace intérieur</p>
            <div class="divider-line"></div>

            <form id="loginForm" novalidate>
                <div class="fg">
                    <label class="fl" for="email">Email</label>
                    <div class="fw">
                        <i class="fas fa-envelope fi"></i>
                        <input class="fi-input" type="email" id="email" placeholder="votre@email.com" autocomplete="email" required>
                    </div>
                </div>
                <div class="fg">
                    <label class="fl" for="password">Mot de passe</label>
                    <div class="fw">
                        <i class="fas fa-lock fi"></i>
                        <input class="fi-input" type="password" id="password" placeholder="••••••••" style="padding-right:42px;" autocomplete="current-password" required>
                        <button type="button" class="eye" id="togglePw"><i class="fas fa-eye" id="eyeIcon"></i></button>
                    </div>
                </div>

                <div class="row-opt">
                    <label class="remember">
                        <input type="checkbox" id="remember"> Se souvenir de moi
                    </label>
                    <button type="button" class="forgot-link" id="openForgot">Mot de passe oublié ?</button>
                </div>

                <button type="submit" class="btn-main">Se connecter</button>
                <p class="login-err" id="loginErr"></p>
            </form>

            <a href="../index.html" class="back-home" style="margin-top:24px;">← Retour à l'accueil</a>
        </div>

    </div>

    <!-- Modal Mot de passe oublié -->
    <div id="forgotModal" style="display:none;" class="modal-overlay" role="dialog" aria-modal="true">
        <div class="modal-box">
            <p class="modal-title">Réinitialiser le mot de passe</p>
            <p class="modal-sub">Entrez votre adresse email. Vous recevrez un lien pour choisir un nouveau mot de passe.</p>
            <div class="fg">
                <label class="fl" for="forgotEmail">Email</label>
                <div class="fw">
                    <i class="fas fa-envelope fi"></i>
                    <input class="fi-input" type="email" id="forgotEmail" placeholder="votre@email.com" autocomplete="email">
                </div>
            </div>
            <button type="button" class="btn-main" id="forgotSubmit" style="margin-top:8px;">Envoyer le lien</button>
            <p class="modal-err" id="forgotMsg"></p>
            <button type="button" class="modal-close" id="closeForgot">Fermer</button>
        </div>
    </div>

    <script>
        // Œil mot de passe
        document.getElementById('togglePw').addEventListener('click', function() {
            const inp = document.getElementById('password');
            const ic  = document.getElementById('eyeIcon');
            inp.type = inp.type === 'password' ? 'text' : 'password';
            ic.className = inp.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
        });

        // Soumission connexion - Appel API réel
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const pw    = document.getElementById('password').value;
            const err   = document.getElementById('loginErr');

            if (!email || !pw) { err.textContent = 'Veuillez remplir tous les champs.'; return; }
            err.textContent = '';

            const btn = this.querySelector('button[type=submit]');
            btn.disabled = true; btn.textContent = 'Connexion…';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password: pw })
                });

                const data = await response.json();

                if (data.success) {
                    // Vérifier si "Se souvenir de moi" est coché
                    const rememberMe = document.getElementById('remember')?.checked || false;
                    
                    const sessionData = JSON.stringify({
                        email,
                        name: data.user?.name || email.split('@')[0],
                        subscribed: data.user?.subscribed || false,
                        id: data.user?.id || null,
                        access_token: data.session?.access_token || null,
                        refresh_token: data.session?.refresh_token || null
                    });
                    sessionStorage.setItem('oradia_member_session', sessionData);

                    if (rememberMe) {
                        // Persistance avec localStorage
                        localStorage.setItem('isLoggedIn', 'true');
                        localStorage.setItem('userEmail', email);
                        localStorage.setItem('userName', data.user?.name || email.split('@')[0]);
                        localStorage.setItem('rememberMe', 'true');
                        localStorage.setItem('oradia_member_session', sessionData);
                    } else {
                        // Session temporaire avec sessionStorage (se supprime à la fermeture)
                        sessionStorage.setItem('isLoggedIn', 'true');
                        sessionStorage.setItem('userEmail', email);
                        sessionStorage.setItem('userName', data.user?.name || email.split('@')[0]);
                        sessionStorage.setItem('rememberMe', 'false');
                    }
                    flash('Connexion réussie ! Redirection…', 'success');
                    const returnTo = sessionStorage.getItem('oradia_login_return');
                    sessionStorage.removeItem('oradia_login_return');
                    // Rediriger vers la page demandée, ou abonnements par défaut (pas dashboard admin)
                    setTimeout(() => { window.location.href = returnTo || '../index.html'; }, 1400);
                } else {
                    btn.disabled = false; btn.textContent = 'Se connecter';
                    err.textContent = data.error || 'Email ou mot de passe incorrect.';
                }
            } catch (error) {
                btn.disabled = false; btn.textContent = 'Se connecter';
                err.textContent = 'Erreur de connexion. Veuillez réessayer.';
                console.error('Login error:', error);
            }
        });

        // Modal mot de passe oublié
        const forgotModal  = document.getElementById('forgotModal');
        document.getElementById('openForgot').addEventListener('click', () => {
            forgotModal.style.display = 'flex';
            document.getElementById('forgotEmail').focus();
        });
        document.getElementById('closeForgot').addEventListener('click', () => {
            forgotModal.style.display = 'none';
            document.getElementById('forgotMsg').textContent = '';
            document.getElementById('forgotMsg').className = 'modal-err';
        });
        forgotModal.addEventListener('click', e => { if (e.target === forgotModal) document.getElementById('closeForgot').click(); });

        document.getElementById('forgotSubmit').addEventListener('click', async function() {
            const email = document.getElementById('forgotEmail').value.trim();
            const msg   = document.getElementById('forgotMsg');
            if (!email) { msg.className = 'modal-err error'; msg.textContent = 'Veuillez entrer votre email.'; return; }
            this.disabled = true; this.textContent = 'Envoi…';
            try {
                const res  = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                msg.className = 'modal-err success';
                msg.textContent = 'Si cet email existe, un lien vous a été envoyé.';
                this.textContent = 'Email envoyé ✓';
            } catch(e) {
                msg.className = 'modal-err error';
                msg.textContent = 'Erreur réseau. Veuillez réessayer.';
                this.disabled = false; this.textContent = 'Envoyer le lien';
            }
        });

        // Flash
        function flash(msg, type) {
            const old = document.querySelector('.flash');
            if (old) old.remove();
            const el = document.createElement('div');
            el.className = 'flash ' + type;
            el.innerHTML = `<i class="fas fa-${type==='error'?'exclamation-circle':'check-circle'}" style="margin-right:8px;"></i>${msg}`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 3500);
        }

        // Optionnel : redirection auto si déjà connecté (désactivé pour permettre reconnexion)
        // if (localStorage.getItem('isLoggedIn') === 'true') {
        //     window.location.href = 'abonnements.html';
        // }
    </script>
</body>
</html>
