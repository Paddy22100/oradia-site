<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouveau mot de passe - ORADIA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Lora', Georgia, serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .bg-scene { position: fixed; inset: 0; background: url('../images/oradia-hero-4k.png') center/cover no-repeat; z-index: 0; }
        .bg-overlay { position: fixed; inset: 0; background: linear-gradient(140deg,rgba(4,10,28,0.78) 0%,rgba(8,18,42,0.72) 100%); backdrop-filter: blur(2px); z-index: 1; }
        .wrapper {
            position: relative; z-index: 2;
            width: min(420px, 90vw);
            background: linear-gradient(155deg, rgba(12,24,58,0.82) 0%, rgba(6,14,36,0.88) 100%);
            border: 1px solid rgba(212,175,55,0.35);
            border-radius: 28px;
            padding: 48px 40px;
            box-shadow: 0 32px 100px rgba(0,0,0,0.55), 0 0 80px rgba(212,175,55,0.12);
            backdrop-filter: blur(10px);
            animation: fadeUp .5s cubic-bezier(.22,.68,0,1.2) both;
        }
        @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
        .brand { display: flex; align-items: center; gap: 14px; margin-bottom: 32px; }
        .brand img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; border: 1.5px solid rgba(212,175,55,0.45); }
        .brand-name { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 700; letter-spacing: 0.28em; text-transform: uppercase; background: linear-gradient(135deg,#f0c75e,#d4af37); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .title { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 700; color: #f5e4a0; margin-bottom: 8px; }
        .sub { font-size: 13px; color: rgba(220,210,175,0.62); margin-bottom: 28px; }
        .fg { margin-bottom: 18px; }
        .fl { display: block; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(212,175,55,0.65); margin-bottom: 7px; }
        .fw { position: relative; }
        .fi { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: rgba(212,175,55,0.45); font-size: 13px; pointer-events: none; }
        .fi-input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(212,175,55,0.28); border-radius: 10px; padding: 13px 14px 13px 38px; color: rgba(245,228,160,0.92); font-family: 'Lora',serif; font-size: 14px; outline: none; transition: border-color .2s; }
        .fi-input:focus { border-color: rgba(212,175,55,0.7); }
        .eye { position: absolute; right: 13px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: rgba(212,175,55,0.35); font-size: 13px; transition: color .2s; padding: 2px; }
        .eye:hover { color: rgba(212,175,55,0.80); }
        .btn-main { width: 100%; background: linear-gradient(135deg,rgba(212,175,55,0.20),rgba(212,175,55,0.09)); border: 1.5px solid rgba(212,175,55,0.80); color: #f0c75e; border-radius: 50px; padding: 15px; cursor: pointer; font-family: 'Cormorant Garamond',serif; font-size: 17px; font-weight: 700; letter-spacing: 0.20em; text-transform: uppercase; transition: all .2s; margin-top: 8px; }
        .btn-main:hover { background: linear-gradient(135deg,rgba(212,175,55,0.30),rgba(212,175,55,0.15)); box-shadow: 0 0 40px rgba(212,175,55,0.20); }
        .btn-main:disabled { opacity: 0.5; cursor: not-allowed; }
        .msg { font-size: 12px; min-height: 16px; margin-top: 12px; text-align: center; }
        .msg.error { color: rgba(231,76,60,0.90); }
        .msg.success { color: rgba(100,200,100,0.90); }
        .back-link { display: block; text-align: center; margin-top: 20px; font-size: 12px; color: rgba(212,175,55,0.55); text-decoration: none; transition: color .2s; }
        .back-link:hover { color: #d4af37; }
    </style>
</head>
<body>
    <div class="bg-scene"></div>
    <div class="bg-overlay"></div>

    <div class="wrapper">
        <div class="brand">
            <img src="../images/logo-hd-v2.jpeg" alt="ORADIA">
            <span class="brand-name">ORADIA</span>
        </div>

        <p class="title">Nouveau mot de passe</p>
        <p class="sub">Choisissez un nouveau mot de passe pour votre espace.</p>

        <div class="fg">
            <label class="fl" for="newPassword">Nouveau mot de passe</label>
            <div class="fw">
                <i class="fas fa-lock fi"></i>
                <input class="fi-input" type="password" id="newPassword" placeholder="••••••••" autocomplete="new-password">
                <button type="button" class="eye" id="togglePw"><i class="fas fa-eye"></i></button>
            </div>
        </div>

        <div class="fg">
            <label class="fl" for="confirmPassword">Confirmer le mot de passe</label>
            <div class="fw">
                <i class="fas fa-lock fi"></i>
                <input class="fi-input" type="password" id="confirmPassword" placeholder="••••••••" autocomplete="new-password">
            </div>
        </div>

        <button type="button" class="btn-main" id="submitBtn">Enregistrer</button>
        <p class="msg" id="msg"></p>
        <a href="login.html" class="back-link">← Retour à la connexion</a>
    </div>

    <script>
        const SUPABASE_URL = 'https://nzetikdozynyutlibxotc.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56ZXRpa2RvenlueXV0bGlieG90YyIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNzQ4NzAzMzI3LCJleHAiOjIwNjQyNzkzMjd9.eLV0xFYoVivIiFOqNFObQMXtMRzDwcJqfY-HkN6sMMI';
        const { createClient } = supabase;
        const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Toggle password visibility
        document.getElementById('togglePw').addEventListener('click', function() {
            const input = document.getElementById('newPassword');
            const icon = this.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        });

        document.getElementById('submitBtn').addEventListener('click', async function() {
            const pw  = document.getElementById('newPassword').value;
            const pw2 = document.getElementById('confirmPassword').value;
            const msg = document.getElementById('msg');

            if (!pw || pw.length < 6) {
                msg.className = 'msg error';
                msg.textContent = 'Le mot de passe doit faire au moins 6 caractères.';
                return;
            }
            if (pw !== pw2) {
                msg.className = 'msg error';
                msg.textContent = 'Les mots de passe ne correspondent pas.';
                return;
            }

            this.disabled = true;
            this.textContent = 'Enregistrement…';
            msg.textContent = '';

            const { error } = await sb.auth.updateUser({ password: pw });

            if (error) {
                msg.className = 'msg error';
                msg.textContent = error.message || 'Erreur lors de la mise à jour.';
                this.disabled = false;
                this.textContent = 'Enregistrer';
            } else {
                msg.className = 'msg success';
                msg.textContent = 'Mot de passe mis à jour ! Redirection…';
                setTimeout(() => { window.location.href = 'login.html'; }, 2000);
            }
        });
    </script>
</body>
</html>
