<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - ORADIA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../responsive.css">
    <script src="../security.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'night-blue': '#0a192f',
                        'gold': '#d4af37',
                        'light-gold': '#f5e7a1',
                        'dark-blue': '#051428',
                        'celtic-blue': '#1a365d'
                    },
                    fontFamily: {
                        'cormorant': ['Cormorant Garamond', 'serif'],
                        'poppins': ['Poppins', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        .auth-card {
            background: linear-gradient(145deg, rgba(26,54,93,0.9), rgba(5,20,40,0.95));
            border: 1px solid rgba(212,175,55,0.3);
            backdrop-filter: blur(10px);
        }
        
        .form-input {
            background: rgba(5,20,40,0.7);
            border: 1px solid rgba(212,175,55,0.35);
            padding: 12px 16px;
            border-radius: 8px;
            color: #f4e4c1;
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 0 3px rgba(212,175,55,0.1);
        }
        
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            padding: 12px;
            border-radius: 8px;
        }
        
        .success-message {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #4ade80;
            padding: 12px;
            border-radius: 8px;
        }
        
        .gold-gradient {
            background: linear-gradient(135deg, #d4af37, #f5e7a1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body class="bg-night-blue min-h-screen flex items-center justify-center p-4">
    <!-- Background Pattern -->
    <div class="absolute inset-0 opacity-5">
        <div class="absolute inset-0" style="background-image: radial-gradient(circle at 25% 25%, #d4af37 1px, transparent 1px), radial-gradient(circle at 75% 75%, #d4af37 1px, transparent 1px); background-size: 50px 50px;"></div>
    </div>
    
    <!-- Main Container -->
    <div class="relative z-10 w-full max-w-md">
        <!-- Logo and Title -->
        <div class="text-center mb-8">
            <img src="../images/logo-hd-v2.jpeg" alt="ORADIA" class="w-20 h-20 mx-auto mb-4 rounded-full border-2 border-gold">
            <h1 class="cormorant text-4xl font-bold gold-gradient mb-2">ORADIA</h1>
            <p class="text-gold/70">Connectez-vous à votre espace</p>
        </div>
        
        <!-- Auth Card -->
        <div class="auth-card rounded-2xl p-8 shadow-2xl">
            <!-- Login Form -->
            <form id="loginForm" class="space-y-6">
                <div>
                    <label for="email" class="block text-gold font-semibold mb-2">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email"
                        required
                        class="form-input"
                        placeholder="votre@email.com"
                        autocomplete="email"
                    >
                </div>
                
                <div>
                    <label for="password" class="block text-gold font-semibold mb-2">Mot de passe</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password"
                        required
                        class="form-input"
                        placeholder="••••••••"
                        autocomplete="current-password"
                    >
                </div>
                
                <div class="flex items-center justify-between">
                    <label class="flex items-center">
                        <input type="checkbox" class="mr-2">
                        <span class="text-gold/70 text-sm">Se souvenir de moi</span>
                    </label>
                    <a href="#" class="text-gold hover:text-light-gold text-sm">Mot de passe oublié?</a>
                </div>
                
                <button type="submit" class="btn-gold w-full flex items-center justify-center gap-2">
                    <i class="fas fa-sign-in-alt"></i>
                    Se connecter
                </button>
            </form>
            
            <!-- Messages Container -->
            <div id="messageContainer" class="mt-4"></div>
            
            <!-- Register Link -->
            <div class="mt-6 text-center">
                <p class="text-gold/70">
                    Pas encore de compte? 
                    <a href="member/register.html" class="text-gold hover:text-light-gold font-semibold">S'inscrire</a>
                </p>
            </div>
            
            <!-- Back to Site -->
            <div class="mt-8 text-center">
                <a href="../index.html" class="text-gold/70 hover:text-gold text-sm flex items-center justify-center gap-2">
                    <i class="fas fa-arrow-left"></i>
                    Retour au site
                </a>
            </div>
        </div>
    </div>

    <script>

        // Inclure le système d'authentification
        document.addEventListener('DOMContentLoaded', function() {
            // Vérifier si déjà connecté
            if (localStorage.getItem('oradiaAuth') === 'true') {
                // Rediriger vers le tableau de bord si déjà connecté
                window.location.href = '../member/dashboard.html';
                return;
            }

            // Gestion du formulaire
            const loginForm = document.getElementById('loginForm');
            const messageContainer = document.getElementById('messageContainer');

            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                // Validation basique
                if (!email || !password) {
                    showMessage('Veuillez remplir tous les champs', 'error');
                    return;
                }

                // Simulation de connexion (accepte n'importe quel email/password pour le test)
                if (email && password) {
                    // Simuler une connexion réussie
                    localStorage.setItem('oradiaAuth', 'true');
                    localStorage.setItem('oradiaUserEmail', email);
                    localStorage.setItem('oradiaUserName', email.split('@')[0]);
                    
                    showMessage('Connexion réussie! Redirection vers le dashboard...', 'success');
                    
                    // Rediriger vers le dashboard après 1.5 secondes
                    setTimeout(() => {
                        window.location.href = '../member/dashboard.html';
                    }, 1500);
                } else {
                    showMessage('Email ou mot de passe incorrect', 'error');
                }
            });
        });

        function showMessage(message, type) {
            const messageContainer = document.getElementById('messageContainer');
            const className = type === 'error' ? 'error-message' : 'success-message';
            
            messageContainer.innerHTML = `
                <div class="${className}">
                    ${message}
                </div>
            `;
        }
    </script>
</body>
</html>
