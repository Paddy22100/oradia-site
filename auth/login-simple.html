<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - ORADIA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../responsive.css">
    <script src="../security.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'night-blue': '#0a192f',
                        'gold': '#d4af37',
                        'light-gold': '#f5e7a1',
                        'dark-blue': '#051428',
                        'celtic-blue': '#1a365d'
                    },
                    fontFamily: {
                        'cormorant': ['Cormorant Garamond', 'serif'],
                        'poppins': ['Poppins', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        .gold-gradient {
            background: linear-gradient(135deg, #d4af37, #f5e7a1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .btn-gold {
            background: linear-gradient(135deg, #d4af37, #f5e7a1);
            color: #0a192f;
            padding: 12px 24px;
            border-radius: 9999px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }
        
        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.3);
        }
        
        .form-input {
            background: rgba(5, 20, 40, 0.8);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: #f5e7a1;
            padding: 12px 16px;
            border-radius: 8px;
            width: 100%;
            transition: all 0.3s ease;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }
        
        .error-message {
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.3);
            color: #f87171;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        
        .success-message {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #22c55e;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-night-blue to-dark-blue">
    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="max-w-md w-full space-y-8">
            <!-- Header -->
            <div class="text-center">
                <a href="../index.html" class="inline-flex items-center space-x-3">
                    <img src="../images/logo-hd-v2.jpeg" alt="Oradia Logo" class="w-16 h-16 object-contain">
                    <span class="cormorant text-3xl font-bold gold-gradient">ORADIA</span>
                </a>
                <h1 class="cormorant text-4xl font-bold text-gold mt-8 mb-2">Connexion</h1>
                <p class="text-light-gold text-center">Accédez à votre espace personnel</p>
            </div>

            <!-- Messages -->
            <div id="messageContainer"></div>

            <!-- Formulaire de connexion -->
            <form id="loginForm" class="space-y-6">
                <div>
                    <label for="email" class="block text-sm font-medium text-light-gold mb-2">
                        Email
                    </label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        required
                        class="form-input"
                        placeholder="votre@email.com"
                        autocomplete="email"
                    >
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-light-gold mb-2">
                        Mot de passe
                    </label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        required
                        class="form-input"
                        placeholder="••••••••••"
                        autocomplete="current-password"
                    >
                </div>

                <div>
                    <button
                        type="submit"
                        class="btn-gold w-full flex items-center justify-center space-x-2"
                    >
                        <i class="fas fa-sign-in-alt"></i>
                        <span>Se connecter</span>
                    </button>
                </div>
            </form>

            <!-- Lien vers inscription -->
            <div class="text-center">
                <p class="text-light-gold">
                    Pas encore de compte ? 
                    <a href="register.html" class="text-gold hover:text-light-gold font-medium">
                        Créer un compte
                    </a>
                </p>
            </div>

            <!-- Lien retour -->
            <div class="text-center">
                <a href="../index.html" class="text-gold hover:text-light-gold text-sm">
                    <i class="fas fa-arrow-left mr-2"></i>
                    Retour à l'accueil
                </a>
            </div>
        </div>
    </div>

    <script>
        // Système d'authentification ORADIA
        (function(){
          const AUTH_KEY = 'oradiaAuth';
          const EMAIL_KEY = 'oradiaUserEmail';

          function isAuthed(){ 
            const authStatus = localStorage.getItem(AUTH_KEY);
            const userEmail = localStorage.getItem(EMAIL_KEY);
            return authStatus === '1' && userEmail && userEmail !== '';
          }
          
          function setAuthed(v, email = null){ 
            if (v && email) {
              localStorage.setItem(AUTH_KEY, '1');
              localStorage.setItem(EMAIL_KEY, email);
            } else {
              localStorage.removeItem(AUTH_KEY);
              localStorage.removeItem(EMAIL_KEY);
            }
          }

          function getUserEmail(){
            return localStorage.getItem(EMAIL_KEY) || '';
          }

          // Fonction de connexion
          function login(email, password) {
            // Vérification des identifiants (pour le moment, simulation)
            if (email === 'oradia@protonmail.com' && password === 'RafalE12#12') {
              setAuthed(true, email);
              return { success: true, message: 'Connexion réussie' };
            } else {
              return { success: false, message: 'Email ou mot de passe incorrect' };
            }
          }

          // Exposer les fonctions globalement
          window.oradiaAuth = {
            isAuthed,
            login,
            getUserEmail
          };
        })();

        // Inclure le système d'authentification
        document.addEventListener('DOMContentLoaded', function() {
            // Vérifier si déjà connecté
            if (window.oradiaAuth && window.oradiaAuth.isAuthed()) {
                // Rediriger vers le tableau de bord si déjà connecté
                window.location.href = '../member/dashboard.html';
                return;
            }

            // Gestion du formulaire
            const loginForm = document.getElementById('loginForm');
            const messageContainer = document.getElementById('messageContainer');

            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                // Validation basique
                if (!email || !password) {
                    showMessage('Veuillez remplir tous les champs', 'error');
                    return;
                }

                // Tentative de connexion
                if (window.oradiaAuth) {
                    const result = window.oradiaAuth.login(email, password);
                    
                    if (result.success) {
                        showMessage(result.message, 'success');
                        
                        // Rediriger vers l'accueil après 1 seconde pour que le header se mette à jour
                        setTimeout(() => {
                            window.location.href = '../index.html';
                        }, 1000);
                    } else {
                        showMessage(result.message, 'error');
                    }
                }
            });
        });

        function showMessage(message, type) {
            const messageContainer = document.getElementById('messageContainer');
            const className = type === 'error' ? 'error-message' : 'success-message';
            
            messageContainer.innerHTML = `
                <div class="${className}">
                    ${message}
                </div>
            `;
        }
    </script>
</body>
</html>
